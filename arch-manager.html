<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Architecture Dashboard — Low-Entropy Core</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
<style>
:root {
  --bg: #0a0a0a;
  --bg2: #161618;
  --bg3: #1c1c1e;
  --card: #1c1c1e;
  --ink: #f5f5f7;
  --muted: #98989d;
  --dim: #6e6e73;
  --rule: #2c2c2e;
  --accent: #0a84ff;
  --accent-hover: #3395ff;
  --green: #30d158;
  --orange: #ff9f0a;
  --red: #ff453a;
  --sidebar-w: 240px;
  --right-w: 320px;
  --topbar-h: 48px;
  --overview-h: 80px;
  --radius: 12px;
  --radius-sm: 8px;
  --radius-lg: 16px;
  --font: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --mono: 'JetBrains Mono', 'SF Mono', 'Cascadia Code', Consolas, monospace;
  --transition: 0.2s cubic-bezier(0.25, 0.1, 0.25, 1);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--ink);
  font-size: 13px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--rule); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--dim); }

/* Top Status Bar */
.topbar {
  position: fixed;
  left: 0; top: 0; right: 0;
  height: var(--topbar-h);
  background: rgba(10,10,10,0.92);
  backdrop-filter: blur(20px) saturate(180%);
  -webkit-backdrop-filter: blur(20px) saturate(180%);
  border-bottom: 1px solid rgba(255,255,255,0.06);
  z-index: 300;
  display: flex;
  align-items: center;
  padding: 0 20px;
  gap: 24px;
}
.topbar .logo {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 14px;
  font-weight: 600;
  letter-spacing: -0.01em;
  color: var(--ink);
  flex-shrink: 0;
}
.topbar .logo svg { flex-shrink: 0; }
.topbar .spacer { flex: 1; }
.topbar .metric {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 12px;
  color: var(--muted);
}
.topbar .metric .label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--dim); }
.topbar .metric .value { font-weight: 600; color: var(--ink); font-variant-numeric: tabular-nums; }
.topbar .metric .value.good { color: var(--green); }
.topbar .metric .value.warn { color: var(--orange); }
.topbar .metric .value.bad { color: var(--red); }
.topbar .time { font-family: var(--mono); font-size: 12px; color: var(--dim); }

/* Overview Dashboard */
.overview-dash {
  position: fixed;
  left: 0; right: 0;
  top: var(--topbar-h);
  height: var(--overview-h);
  background: #121214;
  border-bottom: 1px solid rgba(255,255,255,0.06);
  z-index: 299;
  display: flex;
  align-items: center;
  padding: 0 20px;
  gap: 12px;
  overflow-x: auto;
}
.overview-dash .ov-card {
  flex: 1;
  min-width: 0;
  height: 56px;
  background: rgba(255,255,255,0.03);
  border-radius: var(--radius-sm);
  border: 1px solid rgba(255,255,255,0.05);
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 0 14px;
  transition: all var(--transition);
  cursor: default;
}
.overview-dash .ov-card:hover {
  background: rgba(255,255,255,0.06);
  border-color: rgba(255,255,255,0.1);
}
.overview-dash .ov-card .ov-icon {
  width: 36px; height: 36px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  background: rgba(255,255,255,0.06);
}
.overview-dash .ov-card .ov-icon svg {
  width: 18px; height: 18px;
  stroke: var(--accent);
}
.overview-dash .ov-card .ov-info {
  display: flex;
  flex-direction: column;
  min-width: 0;
}
.overview-dash .ov-card .ov-label {
  font-size: 10px;
  color: var(--dim);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  white-space: nowrap;
}
.overview-dash .ov-card .ov-value {
  font-size: 18px;
  font-weight: 700;
  letter-spacing: -0.02em;
  color: var(--ink);
  font-variant-numeric: tabular-nums;
  white-space: nowrap;
}

/* Layout */
.layout {
  display: flex;
  height: 100vh;
  padding-top: calc(var(--topbar-h) + var(--overview-h));
}

/* Left Sidebar */
.sidebar {
  width: var(--sidebar-w);
  background: rgba(22,22,24,0.88);
  backdrop-filter: blur(40px) saturate(180%);
  -webkit-backdrop-filter: blur(40px) saturate(180%);
  border-right: 1px solid rgba(255,255,255,0.06);
  display: flex;
  flex-direction: column;
  z-index: 100;
  overflow-y: auto;
  flex-shrink: 0;
}
.sidebar-section { margin-bottom: 2px; }
.sidebar-section-title {
  padding: 8px 16px 6px;
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--dim);
  display: flex;
  align-items: center;
  gap: 6px;
  cursor: pointer;
  user-select: none;
  transition: color var(--transition);
}
.sidebar-section-title:hover { color: var(--muted); }
.sidebar-section-title .chevron {
  width: 12px; height: 12px;
  transition: transform 0.2s ease;
  flex-shrink: 0;
  opacity: 0.5;
}
.sidebar-section-title .chevron.open { transform: rotate(90deg); opacity: 0.8; }
.sidebar-section-files { overflow: hidden; transition: max-height 0.3s ease; }
.sidebar-section-files.collapsed { max-height: 0 !important; }
.sidebar-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 16px 6px 32px;
  font-size: 12px;
  color: var(--muted);
  cursor: pointer;
  transition: all var(--transition);
  border-radius: 0;
}
.sidebar-item:hover { background: rgba(255,255,255,0.04); color: var(--ink); }
.sidebar-item.active { background: rgba(10,132,255,0.12); color: var(--accent); }
.sidebar-item svg { flex-shrink: 0; opacity: 0.6; }
.sidebar-item:hover svg { opacity: 0.9; }
.sidebar-item.active svg { opacity: 1; stroke: var(--accent); }

/* File Tree */
.file-tree-section {
  margin-bottom: 4px;
}
.file-tree-layer {
  border-bottom: 1px solid rgba(255,255,255,0.04);
}
.file-tree-layer-header {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 0;
  cursor: pointer;
  user-select: none;
  transition: background var(--transition);
}
.file-tree-layer-header:hover { background: rgba(255,255,255,0.02); }
.file-tree-layer-header .ft-chevron {
  width: 14px; height: 14px;
  transition: transform 0.2s ease;
  flex-shrink: 0;
  opacity: 0.5;
  margin-left: 4px;
}
.file-tree-layer-header .ft-chevron.open { transform: rotate(90deg); opacity: 0.8; }
.file-tree-layer-header .ft-color {
  width: 10px; height: 10px;
  border-radius: 3px;
  flex-shrink: 0;
}
.file-tree-layer-header .ft-name {
  font-size: 13px;
  font-weight: 600;
  color: var(--ink);
  flex: 1;
}
.file-tree-layer-header .ft-count {
  font-size: 11px;
  color: var(--dim);
  font-family: var(--mono);
}
.file-tree-files {
  overflow: hidden;
  transition: max-height 0.3s ease;
  padding-left: 24px;
}
.file-tree-files.collapsed { max-height: 0 !important; }
.file-tree-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 12px;
  border-radius: 6px;
  cursor: pointer;
  transition: all var(--transition);
  font-size: 12px;
  color: var(--muted);
}
.file-tree-item:hover { background: rgba(255,255,255,0.04); color: var(--ink); }
.file-tree-item .ft-file-icon {
  width: 14px; height: 14px;
  flex-shrink: 0;
  opacity: 0.5;
}
.file-tree-item .ft-file-name {
  flex: 1;
  font-family: var(--mono);
  font-size: 11px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.file-tree-item .ft-file-meta {
  font-size: 10px;
  color: var(--dim);
  font-family: var(--mono);
  white-space: nowrap;
}

/* Main Content */
.main {
  flex: 1;
  min-width: 0;
  overflow-y: auto;
  overflow-x: hidden;
  background: var(--bg);
}
.main-content { padding: 20px 24px 40px; }
.view-title {
  font-size: 20px;
  font-weight: 700;
  letter-spacing: -0.02em;
  margin-bottom: 16px;
  color: var(--ink);
}
.view-desc {
  font-size: 12px;
  color: var(--dim);
  margin-bottom: 20px;
}

/* Cards */
.card {
  background: var(--card);
  border-radius: var(--radius);
  border: 1px solid var(--rule);
  padding: 20px;
  margin-bottom: 16px;
}
.card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}
.card-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.04em;
}
.card-actions { display: flex; gap: 6px; }
.chart-container { width: 100%; height: 320px; }
.chart-container-sm { width: 100%; height: 220px; }
.chart-container-lg { width: 100%; height: 420px; }

/* Grid layouts */
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
.grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }

/* Stats */
.stat-card {
  background: var(--card);
  border-radius: var(--radius);
  padding: 16px 18px;
  border: 1px solid var(--rule);
  transition: all var(--transition);
}
.stat-card:hover { border-color: rgba(255,255,255,0.1); }
.stat-card .label { font-size: 10px; color: var(--dim); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
.stat-card .value { font-size: 26px; font-weight: 700; letter-spacing: -0.02em; color: var(--ink); }
.stat-card .delta { font-size: 11px; color: var(--green); margin-top: 4px; }
.stat-card .delta.warn { color: var(--orange); }
.stat-card .delta.bad { color: var(--red); }

/* Data Table */
.data-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.data-table th { text-align: left; padding: 10px 16px; font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--dim); border-bottom: 1px solid var(--rule); font-weight: 500; }
.data-table td { padding: 8px 16px; border-bottom: 1px solid rgba(255,255,255,0.04); color: var(--muted); }
.data-table tr:hover td { background: rgba(255,255,255,0.03); color: var(--ink); }
.data-table .mono { font-family: var(--mono); font-size: 11px; }

/* Buttons */
.btn {
  padding: 6px 14px;
  border-radius: 8px;
  font-size: 12px;
  font-weight: 500;
  color: var(--muted);
  cursor: pointer;
  border: 1px solid rgba(255,255,255,0.06);
  background: rgba(255,255,255,0.04);
  font-family: var(--font);
  transition: all var(--transition);
  display: inline-flex;
  align-items: center;
  gap: 5px;
  letter-spacing: -0.01em;
  line-height: 1.4;
}
.btn:hover { background: rgba(255,255,255,0.08); color: var(--ink); border-color: rgba(255,255,255,0.1); }
.btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
.btn.primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); }
.btn.sm { padding: 4px 10px; font-size: 11px; border-radius: 6px; }

/* Violation cards */
.violation-card {
  background: var(--card);
  border-radius: var(--radius-sm);
  padding: 12px 16px;
  margin-bottom: 8px;
  display: flex;
  align-items: flex-start;
  gap: 12px;
  border: 1px solid var(--rule);
  transition: all var(--transition);
}
.violation-card:hover { border-color: rgba(255,255,255,0.1); }
.violation-card .sev {
  width: 8px; height: 8px;
  border-radius: 50%;
  margin-top: 5px;
  flex-shrink: 0;
}
.violation-card .sev.error { background: var(--red); box-shadow: 0 0 6px rgba(255,69,58,0.4); }
.violation-card .sev.warning { background: var(--orange); box-shadow: 0 0 6px rgba(255,159,10,0.4); }
.violation-card .sev.info { background: var(--accent); box-shadow: 0 0 6px rgba(10,132,255,0.4); }
.violation-card .body { flex: 1; }
.violation-card .msg { font-size: 13px; font-weight: 500; margin-bottom: 2px; }
.violation-card .detail { font-size: 11px; color: var(--dim); }
.violation-card .badge {
  font-size: 10px;
  padding: 2px 8px;
  border-radius: 8px;
  background: rgba(255,255,255,0.04);
  color: var(--dim);
  flex-shrink: 0;
}

/* Right Detail Panel */
.right-panel {
  width: var(--right-w);
  background: rgba(22,22,24,0.88);
  backdrop-filter: blur(40px) saturate(180%);
  -webkit-backdrop-filter: blur(40px) saturate(180%);
  border-left: 1px solid rgba(255,255,255,0.06);
  display: flex;
  flex-direction: column;
  z-index: 100;
  flex-shrink: 0;
  overflow-y: auto;
}
.right-panel-head {
  padding: 16px 20px;
  border-bottom: 1px solid rgba(255,255,255,0.06);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.right-panel-head .title { font-size: 13px; font-weight: 600; }
.right-panel-body { flex: 1; padding: 16px 20px; }
.detail-empty { text-align: center; padding: 40px 16px; color: var(--dim); font-size: 12px; }
.detail-field { margin-bottom: 14px; }
.detail-field .dl { font-size: 10px; color: var(--dim); text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 2px; }
.detail-field .dv { font-size: 13px; color: var(--ink); word-break: break-all; }
.detail-field .dv.mono { font-family: var(--mono); font-size: 11px; }
.detail-field .dd {
  font-size: 12px;
  color: var(--muted);
  background: rgba(255,255,255,0.03);
  border-radius: var(--radius-sm);
  padding: 10px 12px;
  white-space: pre-wrap;
  line-height: 1.5;
}

/* Control panel items */
.control-group { margin-bottom: 20px; }
.control-group .cg-label { font-size: 11px; font-weight: 600; color: var(--muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.04em; }
.control-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.control-row label { font-size: 12px; color: var(--muted); flex: 1; }
.control-row input[type="range"] {
  flex: 1;
  accent-color: var(--accent);
}
.control-row .val { font-family: var(--mono); font-size: 11px; color: var(--accent); min-width: 40px; text-align: right; }
.control-row input[type="number"] {
  width: 60px;
  padding: 4px 8px;
  background: var(--bg2);
  border: 1px solid var(--rule);
  border-radius: 6px;
  color: var(--ink);
  font-family: var(--mono);
  font-size: 12px;
}

/* Heatmap grid */
.heatmap-grid {
  display: grid;
  grid-template-columns: repeat(8, 1fr);
  gap: 3px;
}
.heatmap-cell {
  aspect-ratio: 1;
  border-radius: 4px;
  cursor: pointer;
  transition: transform 0.15s;
  position: relative;
}
.heatmap-cell:hover { transform: scale(1.15); z-index: 2; }
.heatmap-cell .tip {
  position: absolute;
  bottom: calc(100% + 6px);
  left: 50%;
  transform: translateX(-50%);
  background: var(--bg3);
  border: 1px solid var(--rule);
  padding: 4px 8px;
  border-radius: 6px;
  font-size: 10px;
  white-space: nowrap;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.15s;
  z-index: 10;
}
.heatmap-cell:hover .tip { opacity: 1; }

/* Trace tree */
.trace-node {
  padding: 8px 12px;
  border-radius: 8px;
  background: var(--bg2);
  border: 1px solid var(--rule);
  margin-bottom: 6px;
  font-size: 12px;
  cursor: pointer;
  transition: all var(--transition);
}
.trace-node:hover { border-color: var(--accent); }
.trace-node .tn-name { font-weight: 600; }
.trace-node .tn-meta { font-size: 10px; color: var(--dim); margin-top: 2px; }
.trace-children { padding-left: 20px; border-left: 2px solid var(--rule); margin-left: 8px; }

/* Empty state */
.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--dim);
  font-size: 13px;
}
.empty-state svg { margin-bottom: 12px; opacity: 0.3; }

/* Toast */
.toast-wrap { position: fixed; bottom: 20px; right: 20px; z-index: 400; display: flex; flex-direction: column; gap: 8px; }
.toast {
  padding: 10px 18px;
  border-radius: var(--radius-sm);
  font-size: 12px;
  animation: slideIn 0.3s ease;
  box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  max-width: 360px;
}
.toast.ok { background: #1a3a1a; border: 1px solid rgba(48,209,88,0.3); color: var(--green); }
.toast.err { background: #3a1a1a; border: 1px solid rgba(255,69,58,0.3); color: var(--red); }
.toast.info { background: #1a2a3a; border: 1px solid rgba(10,132,255,0.3); color: var(--accent); }
@keyframes slideIn { from { transform: translateX(20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

/* Responsive */
@media (max-width: 1200px) {
  .right-panel { display: none; }
  .grid-3 { grid-template-columns: 1fr 1fr; }
  .overview-dash { flex-wrap: wrap; height: auto; padding: 8px; }
  .overview-dash .ov-card { min-width: 140px; }
}
@media (max-width: 900px) {
  .sidebar { display: none; }
  .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr; }
  .overview-dash .ov-card { min-width: 120px; }
}
</style>
</head>
<body>

<!-- Top Status Bar -->
<div class="topbar">
  <div class="logo">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
      <rect x="3" y="3" width="7" height="7" rx="2" stroke="#0a84ff"/>
      <rect x="14" y="3" width="7" height="7" rx="2" stroke="#30d158"/>
      <rect x="3" y="14" width="7" height="7" rx="2" stroke="#ff9f0a"/>
      <rect x="14" y="14" width="7" height="7" rx="2" stroke="#af52de"/>
    </svg>
    <span>Low-Entropy Core</span>
  </div>
  <div class="spacer"></div>
  <div class="metric">
    <span class="label">Health</span>

    <span class="label">Entropy</span>
    <span class="value" id="topEntropy">--</span>
  </div>

    <span class="label">TPS</span>
    <span class="value" id="topTPS">--</span>
  </div>
  <div class="time" id="topTime">--:--:--</div>
</div>

<!-- Overview Dashboard -->
<div class="overview-dash" id="overviewDash">
  <div class="ov-card" id="ovHealth">
    <div class="ov-icon">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>

    <div class="ov-info">
      <span class="ov-label">健康评分</span>
      <span class="ov-value">--</span>
    </div>
  </div>
  <div class="ov-card" id="ovFiles">
    <div class="ov-icon">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
    </div>
    <div class="ov-info">
      <span class="ov-label">总文件数</span>
      <span class="ov-value">--</span>
    </div>
  </div>
  <div class="ov-card" id="ovLines">
    <div class="ov-icon">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
    </div>
    <div class="ov-info">
      <span class="ov-label">总行数</span>
      <span class="ov-value">--</span>
    </div>
  </div>
  <div class="ov-card" id="ovSymbols">
    <div class="ov-icon">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>

<script>
// ============================================================
// State
// ============================================================
let currentView = 'topology';
let archData = null, healthScore = null, violations = [];
let primitives = [], runtime = { tps: 0, errors: 0, latency: 0 };
let guardian = { snapshot: null, thresholds: [], drift: 0, history: [] };
let traceTree = null, versionDiff = null, changelog = [];
let healthHistory = [];
let obsSteps = [], obsAggregates = [], obsPipelines = [], obsArch = null, obsErrors = [];
let obsTraceDetail = null;
let obsStepsQuery = { pattern: '', unit: '', error_only: false, limit: 50 };
let obsAggQuery = { window: '', unit: '', pattern: '', limit: 20 };
let sseArch = null, sseGuardian = null, sseDev = null;
let devEvents = [];
let charts = {};
let tpsHistory = [], errorHistory = [], latencyHistory = [];
const MAX_POINTS = 60;
let collapsed = { panorama: false, runtime: false, control: false, traceability: false, observability: false };

// ============================================================
// API
// ============================================================
const API = '';
async function api(url) {
  const r = await fetch(API + url);
  if (!r.ok) throw new Error('HTTP ' + r.status);
  return r.json();
}

// Observation lazy-load query helpers
async function queryObsSteps() {
  const q = obsStepsQuery;
  let url = '/api/observation/steps/query?limit=' + q.limit;
  if (q.pattern) url += '&pattern=' + encodeURIComponent(q.pattern);
  if (q.unit) url += '&unit=' + encodeURIComponent(q.unit);
  if (q.error_only) url += '&error_only=true';
  try { obsSteps = await api(url); toast('查询完成: ' + obsSteps.length + ' 条', 'ok'); } catch(e) { toast('查询失败: ' + e.message, 'err'); }
}

async function fetchObsErrors() {
  try { obsErrors = await api('/api/observation/steps/errors'); toast('错误步骤: ' + obsErrors.length + ' 条', 'ok'); } catch(e) { toast('查询失败: ' + e.message, 'err'); }
}

async function fetchObsTrace(traceId) {
  try { obsTraceDetail = await api('/api/observation/trace/' + encodeURIComponent(traceId)); toast('Trace 已加载', 'ok'); } catch(e) { toast('Trace 加载失败: ' + e.message, 'err'); }
}

async function queryObsAggregates() {
  const q = obsAggQuery;
  let url = '/api/observation/aggregates/query?limit=' + q.limit;
  if (q.window) url += '&window=' + encodeURIComponent(q.window);
  if (q.unit) url += '&unit=' + encodeURIComponent(q.unit);
  if (q.pattern) url += '&pattern=' + encodeURIComponent(q.pattern);
  try { obsAggregates = await api(url); toast('聚合查询完成: ' + obsAggregates.length + ' 条', 'ok'); } catch(e) { toast('查询失败: ' + e.message, 'err'); }
}

async function fetchAll() {
  try {
    const [arch, health, vio, prim, hhist, gsnap, gthresh, gdrift, ghist, tps, errs, lat, sr, trace, vdiff, clog, osteps, oaggs, opipes, oarch, oerrs] = await Promise.all([
      api('/api/arch').catch(() => null),
      api('/api/health-score').catch(() => null),
      api('/api/violations').catch(() => []),
      api('/api/primitives').catch(() => []),
      api('/api/health-score/history').catch(() => []),
      api('/api/guardian/snapshot').catch(() => null),
      api('/api/guardian/thresholds').catch(() => []),
      api('/api/guardian/drift').catch(() => 0),
      api('/api/guardian/history').catch(() => []),
      api('/api/runtime/tps').catch(() => 0),
      api('/api/runtime/errors').catch(() => 0),
      api('/api/runtime/latency').catch(() => 0),
      api('/api/runtime/sampling-rate').catch(() => 100),
      api('/api/observation/trace-tree').catch(() => null),
      api('/api/version/diff').catch(() => null),
      api('/api/version/changelog').catch(() => []),
      api('/api/observation/steps').catch(() => []),
      api('/api/observation/aggregates').catch(() => []),
      api('/api/observation/pipelines').catch(() => []),
      api('/api/observation/architecture').catch(() => null),
      api('/api/observation/steps/errors').catch(() => [])
    ]);
    archData = arch;
    healthScore = health;
    violations = Array.isArray(vio) ? vio : [];
    primitives = Array.isArray(prim) ? prim : [];
    healthHistory = Array.isArray(hhist) ? hhist : [];
    guardian = { snapshot: gsnap, thresholds: gthresh, drift: gdrift, history: ghist };
    runtime = { tps: tps || 0, errors: errs || 0, latency: lat || 0, sampling: sr || 100 };
    traceTree = trace;
    versionDiff = vdiff;
    changelog = Array.isArray(clog) ? clog : [];
    obsSteps = Array.isArray(osteps) ? osteps : [];
    obsAggregates = Array.isArray(oaggs) ? oaggs : [];
    obsPipelines = Array.isArray(opipes) ? opipes : [];
    obsArch = oarch;
    obsErrors = Array.isArray(oerrs) ? oerrs : [];
    updateTopBar();
    updateOverviewDash();
    toast('数据已刷新', 'ok');
  } catch (e) {
    toast('刷新失败: ' + e.message, 'err');
  }
}

// ============================================================
// SSE
// ============================================================
function connectSSE() {
  if (sseArch) sseArch.close();
  if (sseGuardian) sseGuardian.close();

  try {
    sseArch = new EventSource('/api/sse');
    sseArch.onmessage = (ev) => {
      try {
        const d = JSON.parse(ev.data);
        if (d.arch) archData = d.arch;
        if (d.healthScore) healthScore = d.healthScore;
        if (d.violations) violations = d.violations;
        if (d.runtime) runtime = { ...runtime, ...d.runtime };
        updateTopBar();
        updateOverviewDash();
        if (currentView === 'heartbeat') renderHeartbeat();
        if (currentView === 'entropyHeatmap') renderEntropyHeatmap();
        if (currentView === 'errorBP') renderErrorBP();
      } catch (e) {}
    };
    sseArch.onerror = () => { if (sseArch) { sseArch.close(); sseArch = null; } };
  } catch (e) {}

  try {
    sseGuardian = new EventSource('/api/guardian/sse');
    sseGuardian.onmessage = (ev) => {
      try {
        const d = JSON.parse(ev.data);
        if (d.snapshot) guardian.snapshot = d.snapshot;
        if (d.drift !== undefined) guardian.drift = d.drift;
        if (d.thresholds) guardian.thresholds = d.thresholds;
        updateTopBar();
        updateOverviewDash();
        if (currentView === 'entropyHeatmap') renderEntropyHeatmap();
        if (currentView === 'threshold') renderThresholdView();
      } catch (e) {}
    };
    sseGuardian.onerror = () => { if (sseGuardian) { sseGuardian.close(); sseGuardian = null; } }
  } catch (e) {}

  // Dev Events SSE — 实时开发进度
  try {
    sseDev = new EventSource('/api/sse/dev-events');
    sseDev.onmessage = (ev) => {
      try {
        const e = JSON.parse(ev.data);
        e._ts = Date.now();
        devEvents.unshift(e);
        if (devEvents.length > 200) devEvents.length = 200;
        // 实时更新视图
        if (e.type === 'file_changed' || e.type === 'build_done') {
          updateTopBar();
          updateOverviewDash();
        }
        if (currentView === 'devProgress') renderDevProgress();
      } catch (ex) {}
    };
    sseDev.onerror = () => { if (sseDev) { sseDev.close(); sseDev = null; } };
  } catch (e) {}
}

// ============================================================
// Top Bar
// ============================================================
function updateTopBar() {
  const h = document.getElementById('topHealth');
  const e = document.getElementById('topEntropy');
  const t = document.getElementById('topTPS');
  if (healthScore) {
    const s = parseFloat(healthScore.overall) || 0;
    h.textContent = s + ' (' + (healthScore.grade || '--') + ')';
    h.className = 'value ' + (s >= 80 ? 'good' : s >= 60 ? 'warn' : 'bad');
  }
  if (guardian && guardian.drift != null) {
    const d = parseFloat(guardian.drift);
    if (!isNaN(d)) {
      e.textContent = d.toFixed(3);
      e.className = 'value ' + (d < 0.1 ? 'good' : d < 0.3 ? 'warn' : 'bad');
    }
  }
  if (runtime && runtime.tps != null) {
    const tps = parseFloat(runtime.tps);
    if (!isNaN(tps)) t.textContent = tps.toFixed(0);
  }
}

// ============================================================
// Overview Dashboard
// ============================================================
function updateOverviewDash() {
  // Health Score
  const ovHealth = document.querySelector('#ovHealth .ov-value');
  const ovHealthEl = ovHealth;
  if (healthScore && healthScore.overall != null) {
    const s = parseFloat(healthScore.overall) || 0;
    ovHealthEl.textContent = s + ' (' + (healthScore.grade || '--') + ')';
    ovHealthEl.style.color = s >= 80 ? 'var(--green)' : s >= 60 ? 'var(--orange)' : 'var(--red)';
  } else {
    ovHealthEl.textContent = '--';
    ovHealthEl.style.color = '';
  }

  // Total Files
  const ovFiles = document.querySelector('#ovFiles .ov-value');
  if (archData && archData.total_files !== undefined) {
    ovFiles.textContent = archData.total_files;
  } else if (archData && archData.files) {
    ovFiles.textContent = archData.files.length;
  } else {
    ovFiles.textContent = '--';
  }

  // Total Lines
  const ovLines = document.querySelector('#ovLines .ov-value');
  if (archData && archData.total_lines !== undefined) {
    ovLines.textContent = archData.total_lines;
  } else {
    ovLines.textContent = '--';
  }

  // Total Symbols
  const ovSymbols = document.querySelector('#ovSymbols .ov-value');
  if (archData && archData.total_symbols !== undefined) {
    ovSymbols.textContent = archData.total_symbols;
  } else {
    ovSymbols.textContent = '--';
  }

  // Violations Count
  const ovViolations = document.querySelector('#ovViolations .ov-value');
  ovViolations.textContent = violations.length;
  if (violations.length > 0) {
    ovViolations.style.color = 'var(--orange)';
  } else {
    ovViolations.style.color = 'var(--green)';
  }

  // Primitives Count
  const ovPrimitives = document.querySelector('#ovPrimitives .ov-value');
  ovPrimitives.textContent = primitives.length;
}

function toggleSection(id) {
  collapsed[id] = !collapsed[id];
  const el = document.getElementById('sec-' + id);
  const chev = document.getElementById('chev-' + id);
  if (el) el.style.maxHeight = collapsed[id] ? '0' : '400px';
  if (el) {
    if (id === 'panorama') el.style.maxHeight = collapsed[id] ? '0' : '500px';
    else el.style.maxHeight = collapsed[id] ? '0' : '400px';
  }
  if (chev) chev.classList.toggle('open', !collapsed[id]);
}

function switchView(view) {
  currentView = view;
  document.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.sidebar-item[data-view="' + view + '"]').forEach(el => el.classList.add('active'));
  renderCurrentView();
}

function renderCurrentView() {
  disposeCharts();
  const container = document.getElementById('mainContent');
  container.innerHTML = '';
  switch (currentView) {
    case 'fileTree': renderFileTreeView(container); break;
    case 'topology': renderTopology(container); break;
    case 'health': renderHealth(container); break;
    case 'violations': renderViolationsView(container); break;
    case 'primitives': renderPrimitivesView(container); break;
    case 'layerMatrix': renderLayerMatrix(container); break;
    case 'heartbeat': renderHeartbeatView(container); break;
    case 'entropyHeatmap': renderEntropyHeatmapView(container); break;
    case 'errorBP': renderErrorBPView(container); break;
    case 'neuralTrace': renderNeuralTraceView(container); break;
    case 'dataFlow': renderDataFlowView(container); break;
    case 'sampling': renderSamplingView(container); break;
    case 'threshold': renderThresholdView(container); break;
    case 'whatif': renderWhatIfView(container); break;
    case 'causation': renderCausationView(container); break;
    case 'timetravel': renderTimeTravelView(container); break;
    case 'attribution': renderAttributionView(container); break;
    case 'obsSteps': renderObsSteps(container); break;
    case 'obsAggregates': renderObsAggregates(container); break;

    case 'obsArch': renderObsArch(container); break;

function disposeCharts() {
  Object.values(charts).forEach(c => { if (c && c.dispose) c.dispose(); });

// ============================================================
// 文件树
// ============================================================
function renderFileTreeView(container) {
  container.innerHTML = '<div class="view-title">文件树</div><div class="view-desc">按层级分组浏览所有文件，点击查看详情</div>';

  const files = archData?.files || [];
  const layers = archData?.layers || [];

  if (files.length === 0) {
    const empty = document.createElement('div');
    empty.className = 'empty-state';
    empty.innerHTML = '<svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg><p>暂无文件数据</p>';
    container.appendChild(empty);
    return;
  }

  // Group files by layer
  const layerMap = {};
  files.forEach(f => {
    const layer = f.layer || 'UNKNOWN';
    if (!layerMap[layer]) layerMap[layer] = [];
    layerMap[layer].push(f);
  });

  // Sort layers by layer number
  const sortedLayers = Object.keys(layerMap).sort((a, b) => {
    const na = parseInt(a.replace('L', '')) || 99;
    const nb = parseInt(b.replace('L', '')) || 99;
    return na - nb;
  });

  const treeRoot = document.createElement('div');
  treeRoot.className = 'file-tree-root';

  sortedLayers.forEach(layerKey => {
    const layerFiles = layerMap[layerKey];
    const layerInfo = layers.find(l => l.layer === layerKey);
    const layerColor = layerInfo?.color || '#888';
    const layerName = layerInfo ? (layerKey + ' ' + layerInfo.name) : layerKey;

    const section = document.createElement('div');
    section.className = 'file-tree-section';

    const header = document.createElement('div');
    header.className = 'file-tree-layer-header';
    header.innerHTML = `
      <svg class="ft-chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
      <span class="ft-color" style="background:${layerColor}"></span>
      <span class="ft-name">${esc(layerName)}</span>
      <span class="ft-count">${layerFiles.length} 文件</span>
    `;

    const filesList = document.createElement('div');
    filesList.className = 'file-tree-files';
    filesList.style.maxHeight = (layerFiles.length * 36 + 20) + 'px';

    layerFiles.sort((a, b) => (a.name || '').localeCompare(b.name || '')).forEach(f => {
      const item = document.createElement('div');
      item.className = 'file-tree-item';
      const ext = (f.name || '').split('.').pop();
      const extColor = ext === 'go' ? '#00ADD8' : ext === 'ts' ? '#3178C6' : ext === 'js' ? '#F7DF1E' : ext === 'py' ? '#3776AB' : ext === 'rs' ? '#DEA584' : 'var(--muted)';
      item.innerHTML = `
        <svg class="ft-file-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        <span class="ft-file-name" style="color:${extColor}" title="${esc(f.name)}">${esc(f.name)}</span>
        <span class="ft-file-meta">${f.lines || 0}行 ${(Array.isArray(f.symbols) ? f.symbols.length : (f.symbols || 0))}符号</span>
      `;
      item.addEventListener('click', () => showFileDetail(f));
      filesList.appendChild(item);
    });

    header.addEventListener('click', () => {
      const chev = header.querySelector('.ft-chevron');
      const isOpen = !filesList.classList.contains('collapsed');
      if (isOpen) {
        filesList.classList.add('collapsed');
        filesList.style.maxHeight = '0';
        chev.classList.remove('open');
      } else {
        filesList.classList.remove('collapsed');
        filesList.style.maxHeight = (layerFiles.length * 36 + 20) + 'px';
        chev.classList.add('open');
      }
    });
    // Start open
    header.querySelector('.ft-chevron').classList.add('open');

    section.appendChild(header);
    section.appendChild(filesList);
    treeRoot.appendChild(section);
  });

  container.appendChild(treeRoot);
}

function showFileDetail(f) {
  const body = document.getElementById('rightPanelBody');
  const layerInfo = archData?.layers?.find(l => l.layer === f.layer);
  const layerColor = layerInfo?.color || '#888';

  let html = '<div class="detail-field"><div class="dl">文件路径</div><div class="dv mono">' + esc(f.path || f.name) + '</div></div>';
  html += '<div class="detail-field"><div class="dl">层级</div><div class="dv"><span style="display:inline-block;width:10px;height:10px;border-radius:3px;background:' + layerColor + ';margin-right:6px"></span>' + esc(f.layer + (layerInfo ? ' ' + layerInfo.name : '')) + '</div></div>';
  html += '<div class="detail-field"><div class="dl">行数</div><div class="dv">' + (f.lines || 0) + '</div></div>';
  html += '<div class="detail-field"><div class="dl">符号数</div><div class="dv">' + (Array.isArray(f.symbols) ? f.symbols.length : (f.symbols || 0)) + '</div></div>';

  if (f.package) {
    html += '<div class="detail-field"><div class="dl">包名</div><div class="dv mono">' + esc(f.package) + '</div></div>';
  }

  if (f.imports && f.imports.length > 0) {
    html += '<div class="detail-field"><div class="dl">导入 (' + f.imports.length + ')</div><div class="dd">' + f.imports.map(i => esc(typeof i === 'string' ? i : i.path || i)).join('\n') + '</div></div>';
  }

  const syms = f.symbols || f.symbols_list;
  if (Array.isArray(syms) && syms.length > 0) {
    html += '<div class="detail-field"><div class="dl">符号列表 (' + syms.length + ')</div><div class="dd">' + syms.map(s => esc(typeof s === 'string' ? s : (s.name || '') + (s.kind ? ' (' + s.kind + ')' : ''))).join('\n') + '</div></div>';
  }

  if (f.depends_on && f.depends_on.length > 0) {
    html += '<div class="detail-field"><div class="dl">依赖 (' + f.depends_on.length + ')</div><div class="dd">' + f.depends_on.map(d => esc(d)).join('\n') + '</div></div>';
  }

  body.innerHTML = html;
}

// ============================================================
// 架构全景 — 拓扑图 (Force-directed graph)
// ============================================================
function renderTopology(container) {
  container.innerHTML = '<div class="view-title">拓扑图</div><div class="view-desc">文件/模块间的依赖关系力导向图</div>';
  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = '<div class="chart-container-lg" id="topologyChart"></div>';
  container.appendChild(card);

  const nodes = [], links = [];
  const layerSet = new Set();
  const nameToPath = {};
  if (archData && archData.files) {
    archData.files.forEach((f) => {
      const shortName = (f.path || f.name).replace(/\\/g, '/').split('/').pop() || f.name;
      nameToPath[shortName] = nameToPath[shortName] || f.path || f.name;
      const layer = archData.layers?.find(l => l.layer === f.layer);
      const color = layer?.color || '#888';
      layerSet.add(f.layer);
      nodes.push({
        id: f.path || f.name,
        name: shortName.replace('.go', ''),
        symbolSize: Math.max(14, Math.min(36, 10 + (f.lines || 100) / 20)),
        value: f.lines || 100,
        category: f.layer || 'L0',
        itemStyle: { color: color }
      });
    });
    archData.files.forEach((f) => {
      (f.depends_on || []).forEach(dep => {
        const targetName = dep + (dep.endsWith('.go') ? '' : '.go');
        const targetPath = nameToPath[targetName] || targetName;
        links.push({ source: f.path || f.name, target: targetPath, value: 1 });
      });
    });
  }
  if (nodes.length === 0) {
    document.getElementById('topologyChart').innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--dim)">暂无拓扑数据</div>';
    return;
  }

  const categories = [...layerSet].sort().map(l => {
    const layer = archData.layers?.find(ll => ll.layer === l);
    return { name: l, itemStyle: { color: layer?.color || '#888' } };
  });

  const chartDom = document.getElementById('topologyChart');
  if (!chartDom) return;
  charts.topology = echarts.init(chartDom);
  charts.topology.setOption({
    backgroundColor: 'transparent',
    tooltip: {
      backgroundColor: '#1c1c1e',
      borderColor: '#2c2c2e',
      textStyle: { color: '#f5f5f7' },
      formatter: function(p) {
        if (p.dataType === 'edge') return p.data.source + ' → ' + p.data.target;
        return p.name + '<br/>行数: ' + p.value + '<br/>层级: ' + p.data.category;
      }
    },
    legend: { show: false },
    series: [{
      type: 'graph',
      layout: 'force',
      roam: true,
      draggable: true,
      categories: categories,
      label: { show: true, fontSize: 10, color: '#98989d', fontFamily: 'system-ui' },
      edgeSymbol: ['none', 'arrow'],
      edgeSymbolSize: [0, 6],
      data: nodes,
      links: links,
      force: { repulsion: 350, edgeLength: 100, gravity: 0.08, layoutAnimation: true },
      lineStyle: { color: '#2c2c2e', width: 1, curveness: 0.2, opacity: 0.5 },
      emphasis: {
        focus: 'adjacency',
        lineStyle: { width: 2, color: '#0a84ff', opacity: 1 }
      }
    }]
  });
  charts.topology.on('click', function(p) {
    if (p.data && p.data.id) {
      const f = (archData?.files || []).find(x => (x.path || x.name) === p.data.id);
      if (f) showFileDetail(f);
    }
  });
}

      splitLine: { lineStyle: { color: '#2c2c2e' } }

      type: 'radar',

    }]

  charts.gauge = echarts.init(document.getElementById('gaugeChart'));

  charts.gauge.setOption({
    backgroundColor: 'transparent',
    series: [{
      type: 'gauge',
      startAngle: 200, endAngle: -20,
      min: 0, max: 100,
      splitNumber: 10,

function renderViolationsView(container) {
  container.innerHTML = '<div class="view-title">违规看板</div><div class="view-desc">按严重程度分组的架构违规</div>';
  const groups = { error: [], warning: [], info: [] };
  violations.forEach(v => {
    const sev = v.severity || 'info';
    if (groups[sev]) groups[sev].push(v);
    else groups.info.push(v);
  });

  ['error', 'warning', 'info'].forEach(sev => {
    const list = groups[sev];
    if (list.length === 0) return;
    const card = document.createElement('div');
    card.className = 'card';
    const titleColor = sev === 'error' ? 'var(--red)' : sev === 'warning' ? 'var(--orange)' : 'var(--accent)';
    card.innerHTML = '<div class="card-title" style="color:' + titleColor + '">' + (sev === 'error' ? '严重' : sev === 'warning' ? '警告' : '提示') + ' (' + list.length + ')</div>';
    list.forEach(v => {
      const item = document.createElement('div');
      item.className = 'violation-card';
      item.innerHTML = '<span class="sev ' + sev + '"></span><div class="body"><div class="msg">' + esc(v.message) + '</div><div class="detail">' + esc(v.detail || '') + '</div></div><span class="badge">' + (v.rule || 'RULE') + '</span>';
      card.appendChild(item);
    });
    container.appendChild(card);
  });
  if (violations.length === 0) {
    container.innerHTML += '<div class="card" style="text-align:center;padding:60px;color:var(--dim)"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#30d158" stroke-width="1.5"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg><p style="margin-top:12px;font-size:13px">架构无违规，状态良好</p></div>';

}

// 动态运行 — 数据流拓扑
// ============================================================
function renderDataFlowView(container) {
  container.innerHTML = '<div class="view-title">数据流拓扑</div><div class="view-desc">基于 Observation Pipeline 数据的 Sankey 拓扑图</div>';
  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = '<div class="chart-container-lg" id="sankeyChart"></div>';
  container.appendChild(card);

  // Build Sankey from real pipeline data and layer dependencies
  const nodes = [], links = [], nodeSet = new Set();
  const addNode = (name) => { if (!nodeSet.has(name)) { nodeSet.add(name); nodes.push({ name }); } };

  if (obsPipelines && obsPipelines.length > 0) {
    obsPipelines.forEach(p => {
      addNode(p.name || p.id || 'unknown');
    });
    // Add flows between layers
    if (archData && archData.files) {
      const layerFlows = {};
      archData.files.forEach(f => {
        (f.depends_on || []).forEach(dep => {
          const key = f.layer + '→' + (archData.files.find(x => x.name === dep || x.name === dep + '.go')?.layer || '?');
          layerFlows[key] = (layerFlows[key] || 0) + 1;
        });
      });
      const layerNames = {};
      (archData.layers || []).forEach(l => { layerNames[l.layer] = l.name; });
      Object.entries(layerFlows).forEach(([key, val]) => {
        const [src, tgt] = key.split('→');
        const srcName = src + ' ' + (layerNames[src] || '');
        const tgtName = tgt + ' ' + (layerNames[tgt] || '');
        addNode(srcName);
        addNode(tgtName);
        links.push({ source: srcName, target: tgtName, value: val });
      });
    }
  } else {
    // Fallback: use layer data
    (archData?.layers || []).forEach(l => { addNode(l.layer + ' ' + l.name); });
    const flows = obsArch?.layer_flows;
    if (flows) {
      Object.entries(flows).forEach(([k, v]) => {
        const [s, t] = k.split('→');
        links.push({ source: s, target: t, value: v });
      });
    }
  }

  charts.sankey = echarts.init(document.getElementById('sankeyChart'));
  charts.sankey.setOption({
    backgroundColor: 'transparent',
    tooltip: { backgroundColor: '#1c1c1e', borderColor: '#2c2c2e', textStyle: { color: '#f5f5f7' } },
    series: [{
      type: 'sankey',
      layout: 'none',
      emphasis: { focus: 'adjacency' },
      data: nodes.length ? nodes : [{ name: '暂无数据' }],
      links: links.length ? links : [{ source: '暂无数据', target: '暂无数据', value: 0 }],
      lineStyle: { color: 'gradient', curveness: 0.5, opacity: 0.4 },
      itemStyle: { color: '#0a84ff', borderColor: '#0a0a0a' },
      label: { color: '#f5f5f7', fontSize: 11, fontFamily: 'var(--font)' }
    }]
  });
}

function renderWhatIfView(container) {
  container.innerHTML = '<div class="view-title">What-If推演</div><div class="view-desc">模拟架构变更的影响</div>';
  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = `
    <div class="control-group">

      <select id="whatifScene" style="width:100%;padding:8px;background:var(--bg2);border:1px solid var(--rule);border-radius:8px;color:var(--ink);font-size:13px">
        <option value="scale">扩容 2x 节点</option>
        <option value="degrade">降级非核心服务</option>
        <option value="failover">主库故障切换</option>
        <option value="cache">缓存命中率下降 50%</option>
      </select>
    </div>
    <div class="control-group">
      <div class="cg-label">自定义参数</div>
      <div class="control-row"><label>节点数</label><input type="number" value="4" id="wiNodes"></div>
      <div class="control-row"><label>QPS</label><input type="number" value="10000" id="wiQps"></div>
      <div class="control-row"><label>错误率 %</label><input type="number" value="0.5" step="0.1" id="wiErr"></div>
    </div>
    <button class="btn primary" onclick="runWhatIf()">运行推演</button>
    <div id="whatifResult" style="margin-top:16px"></div>
  `;
  container.appendChild(card);
}

function runWhatIf() {
  const scene = document.getElementById('whatifScene').value;
  const nodes = parseInt(document.getElementById('wiNodes').value) || 4;
  const qps = parseInt(document.getElementById('wiQps').value) || 10000;
  const err = parseFloat(document.getElementById('wiErr').value) || 0.5;

  let health = 85, latency = 30, throughput = qps / nodes;
  if (scene === 'scale') { health += 5; latency *= 0.8; throughput *= 1.5; }
  if (scene === 'degrade') { health -= 10; latency *= 0.7; }
  if (scene === 'failover') { health -= 15; latency *= 2; }
  if (scene === 'cache') { health -= 8; latency *= 1.5; }
  health -= err * 2;

  const el = document.getElementById('whatifResult');
  el.innerHTML = `
    <div class="grid-3" style="margin-top:12px">
      <div class="stat-card"><div class="label">预测健康度</div><div class="value" style="color:${health>=80?'var(--green)':health>=60?'var(--orange)':'var(--red)'}">${health.toFixed(1)}</div></div>
      <div class="stat-card"><div class="label">预测延迟 ms</div><div class="value">${latency.toFixed(1)}</div></div>
      <div class="stat-card"><div class="label">预测吞吐</div><div class="value">${Math.round(throughput)}</div></div>
    </div>
    <div class="card" style="margin-top:12px">
      <div class="card-title">影响分析</div>
      <div style="font-size:12px;color:var(--muted);line-height:1.6">
        场景: ${esc(scene)}<br>
        节点: ${nodes} | QPS: ${qps} | 错误率: ${err}%<br>
        ${health < 60 ? '警告: 推演结果显示系统健康度将降至危险水平，建议采取缓解措施。' : '推演结果在可接受范围内。'}
      </div>
    </div>
  `;
}

// ============================================================
// 溯源面板 — 因果链
// ============================================================
function renderCausationView(container) {
  container.innerHTML = '<div class="view-title">因果链</div><div class="view-desc">事件因果关系链式追踪</div>';
  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = '<div class="chart-container-lg" id="causationChart"></div>';
  container.appendChild(card);

  // Build causation graph from traceTree spans
  let data = [];
  let links = [];

  if (traceTree && traceTree.spans && traceTree.spans.length > 0) {
    const spanMap = {};
    traceTree.spans.forEach(span => {
      spanMap[span.id] = span;
    });

    const nodeSet = new Set();
    traceTree.spans.forEach(span => {
      const name = span.name || span.id;
      if (!nodeSet.has(span.id)) {
        nodeSet.add(span.id);
        const color = span.error ? '#ff453a' : (span.duration > 100 ? '#ff9f0a' : '#0a84ff');
        data.push({ id: span.id, name: name, itemStyle: { color: color } });
      }
      if (span.parentId && spanMap[span.parentId]) {
        links.push({ source: span.parentId, target: span.id });
      }
    });

    // Assign positions
    data.forEach((d, i) => {
      const span = spanMap[d.id];
      d.x = (span.depth || 0) * 150;
      d.y = i * 50 + 50;
    });
  }

  if (data.length === 0) {
    document.getElementById('causationChart').innerHTML = '<div class="empty-state" style="padding:40px"><p>暂无因果关系数据</p></div>';
    return;
  }

  charts.causation = echarts.init(document.getElementById('causationChart'));
  charts.causation.setOption({
    backgroundColor: 'transparent',
    tooltip: { backgroundColor: '#1c1c1e', borderColor: '#2c2c2e', textStyle: { color: '#f5f5f7' } },
    series: [{
      type: 'graph',
      layout: 'none',
      roam: true,
      animation: false,
      label: { show: true, fontSize: 12, color: '#f5f5f7' },
      edgeSymbol: ['none', 'arrow'],
      edgeSymbolSize: [0, 10],
      data: data,
      links: links,
      lineStyle: { color: '#2c2c2e', width: 2, curveness: 0.2 },
      emphasis: { focus: 'adjacency', lineStyle: { color: '#0a84ff', width: 3 } }
    }]
  });
}

    changelog.forEach(entry => {
      const type = entry.type || 'change';
      const sevClass = type === 'added' ? 'info' : type === 'removed' ? 'error' : 'warning';
      const badgeColor = type === 'added' ? 'var(--green)' : type === 'removed' ? 'var(--red)' : 'var(--orange)';
      const badge = type === 'added' ? '+' : type === 'removed' ? '-' : '~';
      html += '<div class="violation-card"><span class="sev ' + sevClass + '"></span><div class="body"><div class="msg">' + esc(entry.message || entry.name || entry.file || '') + '</div><div class="detail">' + esc(entry.timestamp || entry.date || '') + ' ' + esc(entry.author || '') + '</div></div><span class="badge" style="color:' + badgeColor + '">' + badge + '</span></div>';
    });
  }

  if (hasVersionDiff) {
    html += '<div class="card-title" style="margin-bottom:12px;margin-top:16px">版本差异</div>';
    html += '<div class="grid-3" style="margin-bottom:16px">';
    html += '<div class="stat-card"><div class="label">新增文件</div><div class="value" style="color:var(--green)">' + (versionDiff.files_added?.length || 0) + '</div></div>';
    html += '<div class="stat-card"><div class="label">删除文件</div><div class="value" style="color:var(--red)">' + (versionDiff.files_removed?.length || 0) + '</div></div>';
    html += '<div class="stat-card"><div class="label">修改文件</div><div class="value" style="color:var(--orange)">' + (versionDiff.files_changed?.length || 0) + '</div></div>';
    html += '</div>';

    (versionDiff.files_added || []).forEach(f => {
      html += '<div class="violation-card"><span class="sev info"></span><div class="body"><div class="msg">' + esc(typeof f === 'string' ? f : f.name) + '</div><div class="detail">新增</div></div><span class="badge" style="color:var(--green)">+</span></div>';
    });
    (versionDiff.files_removed || []).forEach(f => {
      html += '<div class="violation-card"><span class="sev error"></span><div class="body"><div class="msg">' + esc(typeof f === 'string' ? f : f.name) + '</div><div class="detail">删除</div></div><span class="badge" style="color:var(--red)">-</span></div>';
    });
    (versionDiff.files_changed || []).forEach(f => {
      const name = typeof f === 'string' ? f : f.name;
      const delta = f.lines_after !== undefined ? (f.lines_after - f.lines_before) : '~';
      html += '<div class="violation-card"><span class="sev warning"></span><div class="body"><div class="msg">' + esc(name) + '</div><div class="detail">修改 ' + (typeof delta === 'number' ? (delta >= 0 ? '+' : '') + delta + ' 行' : '') + '</div></div><span class="badge" style="color:var(--orange)">~</span></div>';
    });
  }

  card.innerHTML = html;
  container.appendChild(card);
}

// ============================================================
// Right Panel Detail
// ============================================================
function showDetail(title, content) {
  const body = document.getElementById('rightPanelBody');
  body.innerHTML = '<div class="detail-field"><div class="dl">' + esc(title) + '</div><div class="dd">' + esc(content) + '</div></div>';
}

// ============================================================
// Helpers
// ============================================================
function esc(s) {
  return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}
function toast(msg, type) {
  const w = document.getElementById('toastWrap');
  if (!w) { console.log('[toast]', type, msg); return; }
  const el = document.createElement('div');
  el.className = 'toast ' + type;
  el.textContent = msg;
  w.appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

// ============================================================
// 开发进度
// ============================================================
function renderDevProgress(container) {
  container.innerHTML = '<div class="view-title">开发进度</div><div class="view-desc">实时监控代码变更、架构刷新和违规检测</div>';

  // Stats row
  const stats = document.createElement('div');
  stats.className = 'grid-4';
  const fileChanges = devEvents.filter(e => e.type === 'file_changed').length;
  const buildDones = devEvents.filter(e => e.type === 'build_done').length;
  const violationsDuring = devEvents.filter(e => e.type === 'violation_found').length;
  const lastBuild = devEvents.find(e => e.type === 'build_done');
  stats.innerHTML = `
    <div class="stat-card"><div class="label">文件变更</div><div class="value">${fileChanges}</div></div>
    <div class="stat-card"><div class="label">架构刷新</div><div class="value">${buildDones}</div></div>
    <div class="stat-card"><div class="label">违规检测</div><div class="value" style="color:${violationsDuring > 0 ? 'var(--orange)' : 'var(--green)'}">${violationsDuring}</div></div>
    <div class="stat-card"><div class="label">最后刷新</div><div class="value" style="font-size:14px">${lastBuild ? new Date(lastBuild.timestamp).toLocaleTimeString('zh-CN') : '--'}</div></div>
  `;
  container.appendChild(stats);

  // Event log
  const card = document.createElement('div');
  card.className = 'card';
  card.style.padding = '0';
  card.style.overflow = 'auto';
  card.style.maxHeight = 'calc(100vh - 350px)';

  if (devEvents.length === 0) {
    card.innerHTML = '<div style="padding:40px;text-align:center;color:var(--dim)">等待开发事件...（需使用 --watch 启动 arch-manager，然后修改 .go 文件）</div>';
  } else {
    let tbl = '<table class="data-table"><thead><tr><th style="width:80px">时间</th><th style="width:80px">类型</th><th>详情</th></tr></thead><tbody>';
    devEvents.slice(0, 100).forEach(e => {
      const time = new Date(e.timestamp).toLocaleTimeString('zh-CN');
      const typeLabel = { file_changed: '文件变更', build_start: '开始刷新', build_done: '刷新完成', violation_found: '违规检测', connected: '已连接' }[e.type] || e.type;
      const typeColor = { file_changed: 'var(--accent)', build_done: 'var(--green)', violation_found: 'var(--orange)', build_start: 'var(--dim)' }[e.type] || 'var(--muted)';
      const icon = e.action === 'created' ? ' +' : e.action === 'deleted' ? ' -' : e.action === 'modified' ? ' ~' : '';
      const detail = e.file ? esc(e.file) + icon : esc(e.message || '');
      tbl += `<tr><td class="mono" style="font-size:11px">${time}</td><td style="color:${typeColor};font-weight:500">${typeLabel}</td><td style="font-size:12px">${detail}</td></tr>`;
    });
    tbl += '</tbody></table>';
    card.innerHTML = tbl;
  }
  container.appendChild(card);

  // Update badge
  const badge = document.getElementById('devEventBadge');
  if (badge && devEvents.length > 0) {
    badge.style.display = 'inline';
    badge.textContent = devEvents.filter(e => e.type !== 'connected').length;
  }
}

// ============================================================
// Init
// ============================================================
async function init() {
  try {
    await fetchAll();
    updateOverviewDash();
    updateTopBar();
    connectSSE();
    setTimeout(() => { updateOverviewDash(); updateTopBar(); }, 500);
    renderCurrentView();
    toast('架构仪表盘已就绪', 'ok');
  } catch (e) {
    console.error('[init]', e.message, e.stack);
    // Fallback: ensure view renders
    setTimeout(() => { try { renderCurrentView(); } catch(e2) {} }, 1000);
    toast('初始化出错: ' + e.message, 'err');
  }
}
window.addEventListener('DOMContentLoaded', init);
window.addEventListener('resize', () => {
  Object.values(charts).forEach(c => c && c.resize && c.resize());
});
</script>
