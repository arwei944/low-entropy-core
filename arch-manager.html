<script>
// State
let archData = null, healthScore = null, violations = [];
let selectedFile = null, activeTab = 'guide';
let autoRefresh = true, autoTimer = null;
let layerChart = null, kindChart = null, depChart = null;
let treemapChart = null, timelineChart = null;
let collapsedLayers = {}; // track which layers are collapsed
let healthHistory = []; // 健康评分历史记录
const MAX_HISTORY = 30; // 最多保留 30 条历史记录
let sseSource = null; // SSE 连接
let guideData = null; // 引导层数据
let versionData = null; // 版本数据
let diffMode = null; // 版本对比模式: {v1, v2} or null
let complexitySort = { col: 'score', asc: false }; // 复杂度排序状态

// API
const API = '';
async function api(url) {
  const r = await fetch(API + url);
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  return r.json();
}

async function fetchAll() {
  try {
    archData = await api('/api/arch');
    healthScore = await api('/api/health-score');
    violations = (await api('/api/violations')) || [];
    updateStatus('ok', '就绪');
    return true;
  } catch (e) {
    updateStatus('error', e.message);
    throw e;
  }
}

async function refreshData() {
  updateStatus('loading', '刷新中...');
  try {
    const r = await fetch(API + '/api/refresh', { method: 'POST' });
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const d = await r.json();
    archData = d.data;
    healthScore = await api('/api/health-score');
    violations = (await api('/api/violations')) || [];
    updateStatus('ok', '已刷新');
    const c = d.changes;
    if (c) {
      const msgs = [];
      if (c.files_added?.length) msgs.push(`+${c.files_added.length} 新增`);
      if (c.files_removed?.length) msgs.push(`-${c.files_removed.length} 删除`);
      if (c.files_modified?.length) msgs.push(`~${c.files_modified.length} 修改`);
      if (msgs.length) toast(msgs.join(', '), 'info');
      else if (c.message) toast(c.message, 'info');
    }
    recordHealthHistory();
    renderAll();
  } catch (e) {
    updateStatus('error', '刷新失败');
    toast(e.message, 'err');
  }
}

function exportData(fmt) {
  window.open(API + '/api/export?format=' + fmt, '_blank');
  toast('导出已开始', 'ok');
}

// Status
function updateStatus(s, t) {
  document.getElementById('statusDot').className = 'status ' + s;
  document.getElementById('statusText').textContent = t;
}

// Toast
function toast(msg, type) {
  const w = document.getElementById('toastWrap');
  const el = document.createElement('div');
  el.className = 'toast ' + type;
  el.textContent = msg;
  w.appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

// Render All
function renderAll() {
  if (!archData) return;
  renderFileTree();
  if (activeTab === 'guide') renderGuideTab();
  if (activeTab === 'dashboard') renderDashboard();
  if (activeTab === 'symbols') renderSymbols();
  if (activeTab === 'violations') renderViolations();
  if (activeTab === 'dependencies') renderDepGraph('all');
  if (activeTab === 'version') renderVersionTab();
  if (activeTab === 'file-detail') { /* file detail already rendered */ }
}

// ============================================================
// File Tree (collapsible)
// ============================================================
function renderFileTree() {
  const layers = {};
  archData.files.forEach(f => {
    if (!layers[f.layer]) layers[f.layer] = { layer: f.layer, name: f.layer_name, color: archData.layers?.find(l => l.layer === f.layer)?.color || '#888', files: [] };
    layers[f.layer].files.push(f);
  });
  const sorted = Object.values(layers).sort((a, b) => a.layer.localeCompare(b.layer));
  let h = '';
  sorted.forEach((lg, i) => {
    lg.files.sort((a, b) => a.name.localeCompare(b.name));
    const isCollapsed = collapsedLayers[lg.layer] === true;
    const fileCount = lg.files.length;
    const totalLines = lg.files.reduce((s, f) => s + f.lines, 0);
    h += `<div class="sidebar-section">
      <div class="sidebar-section-title" onclick="toggleLayer('${lg.layer}')">
        <svg class="chevron${isCollapsed ? '' : ' open'}" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
        <span style="color:${lg.color};margin-right:2px">${lg.layer}</span> ${lg.name}
        <span class="file-count">${fileCount} 文件   ${totalLines} 行</span>
      </div>
      <div class="sidebar-section-files${isCollapsed ? ' collapsed' : ''}" style="max-height:${isCollapsed ? '0' : (fileCount * 28 + 4) + 'px'}">`;
    lg.files.forEach(f => {
      h += `<div class="sidebar-file${selectedFile?.name === f.name ? ' active' : ''}" onclick="selectFile('${f.name}')">
        <span class="dot" style="background:${lg.color}"></span>
        <span class="name">${f.name}</span>
        <span class="lines">${f.lines}</span>
      </div>`;
    });
    h += '</div></div>';
  });
  document.getElementById('fileTree').innerHTML = h;
}

function toggleLayer(layer) {
  collapsedLayers[layer] = !collapsedLayers[layer];
  renderFileTree();
}

// ============================================================
// File Detail (dedicated tab, no dashboard overwrite)
// ============================================================
async function selectFile(name) {
  selectedFile = archData.files.find(f => f.name === name);
  if (!selectedFile) return;
  renderFileTree();
  const sd = await api('/api/file?name=' + encodeURIComponent(name));
  showFileDetail(sd);
  switchTabUI('file-detail');
}

function showFileDetail(sd) {
  const f = sd.info;
  const lc = archData.layers?.find(l => l.layer === f.layer)?.color || '#888';
  let h = `<div class="file-header">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
    <span class="fn">${f.name}</span>
    <span class="badge" style="border-left:3px solid ${lc}">${f.layer} ${f.layer_name}</span>
    <span class="badge">${f.package}</span>
  </div>
  <div class="file-meta-grid">
    <div class="file-meta"><div class="ml">行数</div><div class="mv">${f.lines}</div></div>
    <div class="file-meta"><div class="ml">符号</div><div class="mv">${f.symbols.length}</div></div>
    <div class="file-meta"><div class="ml">导入</div><div class="mv">${f.imports.length}</div></div>
    <div class="file-meta"><div class="ml">被依赖</div><div class="mv">${(f.depended_by || []).length}</div></div>
  </div>`;
  if (f.symbols.length) {
    h += `<div class="symbols-section"><div class="section-title">符号</div><div class="symbols-grid">`;
    f.symbols.forEach(s => {
      h += `<div class="symbol-chip" onclick="showSymbolDetail('${s.name}','${f.name}')">
        <span class="ki ${kindAbbr(s.kind)}">${kindAbbr(s.kind)}</span><span>${s.name}</span><span style="font-size:10px;color:var(--dim);margin-left:auto">${kindName(s.kind)}</span></div>`;
    });
    h += '</div></div>';
  }
  h += `<div class="source-box"><div class="source-head"><span>${f.path}</span><span>${f.lines} lines</span></div>
    <pre><code class="language-go" id="srcCode">${escHtml(sd.content)}</code></pre></div>`;
  document.getElementById('fileDetailContent').innerHTML = h;
  setTimeout(() => { if (typeof hljs !== 'undefined') hljs.highlightElement(document.getElementById('srcCode')); }, 100);
}

function showSymbolDetail(name, file) {
  const f = archData.files.find(ff => ff.name === file);
  if (!f) return;
  const s = f.symbols.find(ss => ss.name === name);
  if (!s) return;
  const lc = archData.layers?.find(l => l.layer === f.layer)?.color || '#888';
  let h = `<div class="detail-field"><div class="dl">名称</div><div class="dv" style="font-size:16px;font-weight:600">${s.name}</div></div>
    <div class="detail-field"><div class="dl">类型</div><div class="dv"><span class="ki ${kindAbbr(s.kind)}">${kindAbbr(s.kind)}</span> ${kindName(s.kind)} <span style="color:var(--dim);font-size:11px">— ${kindDesc(s.kind)}</span></div></div>
    ${s.signature ? `<div class="detail-field"><div class="dl">签名</div><div class="dv mono">${escHtml(s.signature)}</div></div>` : ''}
    ${s.receiver ? `<div class="detail-field"><div class="dl">接收者</div><div class="dv">${s.receiver}</div></div>` : ''}
    ${s.doc ? `<div class="detail-field"><div class="dl">文档</div><div class="dd">${escHtml(s.doc)}</div></div>` : ''}
    ${s.fields?.length ? `<div class="detail-field"><div class="dl">字段</div><div class="dd">${escHtml(s.fields.join('\n'))}</div></div>` : ''}
    ${s.methods?.length ? `<div class="detail-field"><div class="dl">方法</div><div class="dd">${escHtml(s.methods.join('\n'))}</div></div>` : ''}
    <div class="detail-field"><div class="dl">文件</div><div class="dv" style="color:var(--accent);cursor:pointer" onclick="selectFile('${f.name}')">${f.name}</div></div>
    <div class="detail-field"><div class="dl">层级</div><div class="dv"><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${lc};margin-right:6px"></span>${f.layer} ${f.layer_name}</div></div>`;
  document.getElementById('detailPanelBody').innerHTML = h;
  document.getElementById('detailPanel').classList.add('open');
}

function closeDetail() { document.getElementById('detailPanel').classList.remove('open'); }

// ============================================================
// Symbol Kind Helpers (Chinese descriptions)
// ============================================================
function kindAbbr(k) {
  const m = { type: 'T', func: 'F', method: 'M', interface: 'I', const: 'C', var: 'V', 'func-type': 'FT', 'type-alias': 'TA' };
  return m[k] || k;
}
function kindName(k) {
  const m = { type: '结构体', func: '函数', method: '方法', interface: '接口', const: '常量', var: '变量', 'func-type': '函数类型', 'type-alias': '类型别名' };
  return m[k] || k;
}
function kindDesc(k) {
  const m = {
    type: '自定义数据结构，包含字段和方法', func: '独立函数，封装可复用的逻辑', method: '绑定到类型的成员方法',
    interface: '抽象行为契约，定义方法签名', const: '编译期确定的不可变值', var: '运行时可变的全局/局部变量',
    'func-type': '将函数签名定义为类型', 'type-alias': '为已有类型创建新名称'
  };
  return m[k] || '';
}

// Dashboard
// ============================================================
function restoreDashboardDOM() {
  if (!document.getElementById('healthBar')) return; // already intact
  document.getElementById('tab-dashboard').innerHTML = `
    <div class="health-bar" id="healthBar"></div>
    <div class="stats-row" id="statsRow"></div>

function complexityColor(score) {
  // 0=绿 → 50=黄 → 100=红
  if (score <= 30) {
    const t = score / 30;
    const r = Math.round(48 * t);
    const g = Math.round(209 - (209 - 159) * t);
    const b = Math.round(88 - (88 - 10) * t);
    return 'rgb(' + r + ',' + g + ',' + b + ')';
  } else if (score <= 70) {
    const t = (score - 30) / 40;
    const r = Math.round(48 + (255 - 48) * t);
    const g = Math.round(159 - 159 * t);
    const b = Math.round(10);
    return 'rgb(' + r + ',' + g + ',' + b + ')';
  } else {
    const t = (score - 70) / 30;
    const r = 255;
    const g = Math.round((1 - t) * 10);
    const b = Math.round(10 + (58 - 10) * t);
    return 'rgb(' + r + ',' + g + ',' + b + ')';
  }
}

// Complexity Table — 复杂度排序表 (v0.6.0)
// ============================================================
function renderComplexityTable() {
  const scores = archData.complexity_scores || {};
  const files = archData.files.map(f => ({
    name: f.name,
    layer: f.layer,
    score: scores[f.name] || 0,
    lines: f.lines,
    symbols: f.symbols.length,
    deps: (f.depends_on || []).length
  }));

  // Sort
  const col = complexitySort.col;
  const asc = complexitySort.asc;
  files.sort((a, b) => {
    let cmp = 0;
    if (col === 'score') cmp = a.score - b.score;
    else if (col === 'name') cmp = a.name.localeCompare(b.name);
    else if (col === 'lines') cmp = a.lines - b.lines;
    else if (col === 'symbols') cmp = a.symbols - b.symbols;
    else if (col === 'deps') cmp = a.deps - b.deps;
    else if (col === 'layer') cmp = a.layer.localeCompare(b.layer);
    return asc ? cmp : -cmp;
  });

  const top15 = files.slice(0, 15);
  const arrow = asc ? ' ▲' : ' ▼';

  const cols = [
    { key: 'score', label: '复杂度' },
    { key: 'name', label: '文件名' },
    { key: 'layer', label: '层级' },
    { key: 'lines', label: '行数' },
    { key: 'symbols', label: '符号' },
    { key: 'deps', label: '依赖' }
  ];

  let h = '<thead><tr>';
  h += '<th>#</th>';
  cols.forEach(c => {
    h += '<th onclick="sortComplexity(\'' + c.key + '\')" style="cursor:pointer">' + c.label + (col === c.key ? arrow : '') + '</th>';
  });
  h += '</tr></thead><tbody>';

  top15.forEach((f, i) => {
    const barW = Math.round(f.score);
    const barColor = complexityColor(f.score);
    h += '<tr onclick="selectFile(\'' + f.name + '\')">';
    h += '<td class="rank">' + (i + 1) + '</td>';
    h += '<td><span class="score-bar" style="width:' + barW + 'px;background:' + barColor + '"></span><b>' + f.score.toFixed(1) + '</b></td>';
    h += '<td style="font-weight:600">' + f.name + '</td>';
    h += '<td>' + f.layer + '</td>';
    h += '<td>' + f.lines + '</td>';
    h += '<td>' + f.symbols + '</td>';
    h += '<td>' + f.deps + '</td>';
    h += '</tr>';
  });
  h += '</tbody>';

  document.getElementById('complexityTable').innerHTML = h;
}

function sortComplexity(col) {
  if (complexitySort.col === col) {
    complexitySort.asc = !complexitySort.asc;
  } else {
    complexitySort.col = col;
    complexitySort.asc = false;
  }
  renderComplexityTable();
}

// ============================================================
// SSE (Server-Sent Events) 实时推送
// ============================================================
function connectSSE() {
  if (sseSource) { sseSource.close(); sseSource = null; }
  try {
    sseSource = new EventSource('/api/sse');
    sseSource.onmessage = async function(event) {
      try {
        const newData = JSON.parse(event.data);
        const changed = !archData || newData.generated_at !== archData.generated_at;
        archData = newData;
        if (changed) {
          // 数据变更时重新获取健康评分和违规
          try {
            healthScore = await api('/api/health-score');
            violations = (await api('/api/violations')) || [];
          } catch(e) { /* 保持旧数据 */ }
          recordHealthHistory();
          renderAll();
        }
        updateStatus('ok', '实时');
      } catch(e) {
        // JSON 解析失败，忽略
      }
    };
    sseSource.onerror = function() {
      updateStatus('error', 'SSE 断开');
      if (sseSource) { sseSource.close(); sseSource = null; }
      // 5 秒后自动重连
      if (autoRefresh) {
        setTimeout(() => {
          if (autoRefresh) {
            updateStatus('loading', '重连中...');
            connectSSE();
          }
        }, 5000);
      }
    };
    updateStatus('ok', '实时');
  } catch(e) {
    updateStatus('error', 'SSE 不支持');
    // 降级到轮询模式
    fallbackToPolling();
  }
}

function disconnectSSE() {
  if (sseSource) { sseSource.close(); sseSource = null; }
}

function fallbackToPolling() {
  autoTimer = setInterval(async () => {
    try {
      await fetchAll();
      recordHealthHistory();
      renderAll();
    } catch(e) {}
  }, 5000);
  updateStatus('ok', '轮询');
}

      <span class="sev ${v.severity}"></span>
      <div class="body"><div class="msg">${v.message}</div><div class="detail">${v.detail}</div></div>
    </div>`).join('');
}

// ============================================================
// 依赖关系图 — 简洁分层架构图（小白也能看懂）
// ============================================================
function renderDepGraph(mode) {
  document.querySelectorAll('.dep-controls .filter-pill').forEach(function(b) {
    b.classList.toggle('active', b.textContent.includes(mode === 'all' ? '文件' : '层级'));
  });
  if (depChart) { depChart.dispose(); depChart = null; }
  var c = document.getElementById('depGraph');
  var lc = { L0: '#7f8ea3', L1: '#00d4aa', L2: '#60a5fa', L3: '#38bdf8', L4: '#ef4444', L5: '#34d399', L6: '#f472b6', L7: '#f59e0b' };
  var ln = { L0: '核心基础', L1: '四原语', L2: '单机韧性', L3: '分布式韧性', L4: 'Guardian', L5: 'Observation', L6: 'EventStore', L7: '应用层' };
  var ld = { L0: '错误处理、类型定义、性能基元', L1: 'Atom/Step/Port/Composer', L2: '熔断、降级、重试、超时', L3: '分布式共识、分片协调', L4: '健康检查、依赖审计、决策引擎', L5: '指标采集、采样、聚合', L6: '事件溯源、投影、升级', L7: '配置、路由、安全、调度' };

  var layers = archData.layers || [];
  if (layers.length === 0) {
    c.innerHTML = '<div style="padding:40px;text-align:center;color:var(--dim)">暂无层级数据</div>';
    return;
  }

  if (mode === 'layers') {
    renderLayerDiagram(c, lc, ln, ld, layers);
  } else {
    renderFileDeps(c, lc, ln, ld, layers);
  }
}

function renderLayerDiagram(c, lc, ln, ld, layers) {
  // 汇总层级间依赖
  var layerDeps = {};
  layers.forEach(function(l) { layerDeps[l.layer] = {}; });
  archData.files.forEach(function(f) {
    (f.depends_on || []).forEach(function(dep) {
      var depFile = archData.files.filter(function(x) { return x.name === dep || x.name === dep + '.go'; })[0];
      if (depFile && depFile.layer !== f.layer) {
        layerDeps[f.layer][depFile.layer] = true;
      }
    });
  });

  var layerOrder = ['L0','L1','L2','L3','L4','L5','L6','L7'];
  var maxIdx = 0;
  layers.forEach(function(l) { var idx = layerOrder.indexOf(l.layer); if (idx > maxIdx) maxIdx = idx; });

  var html = '<div style="display:flex;flex-direction:column;align-items:center;gap:0;padding:16px 0;">';

  for (var i = maxIdx; i >= 0; i--) {
    var k = layerOrder[i];
    var l = layers.filter(function(x) { return x.layer === k; })[0];
    if (!l) continue;
    var color = lc[k] || '#888';
    var name = ln[k] || l.name;
    var desc = ld[k] || '';

    // 计算该层依赖了多少个下层
    var deps = layerDeps[k] || {};
    var depCount = 0;
    for (var j = i - 1; j >= 0; j--) { if (deps[layerOrder[j]]) depCount++; }

    html += '<div style="display:flex;align-items:center;gap:12px;width:100%;max-width:640px;">';
    // 卡片
    html += '<div style="flex:1;background:#1c1c1e;border:1px solid #2c2c2e;border-radius:8px;padding:14px 16px;border-left:4px solid ' + color + ';">';
    html += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;">';
    html += '<span style="font-weight:700;font-size:15px;color:' + color + ';">' + k + '</span>';
    html += '<span style="font-weight:600;font-size:14px;color:var(--ink);">' + name + '</span>';
    html += '</div>';
    html += '<div style="font-size:11px;color:var(--dim);margin-bottom:6px;">' + desc + '</div>';
    html += '<div style="display:flex;gap:16px;font-size:11px;color:var(--muted);">';
    html += '<span>📄 ' + l.files + ' 文件</span>';
    html += '<span>📝 ' + l.lines + ' 行</span>';
    html += '<span>🔗 依赖 ' + depCount + ' 个下层</span>';
    html += '</div></div>';

    // 依赖指示圆点
    if (depCount > 0) {
      html += '<div style="display:flex;flex-direction:column;align-items:center;gap:2px;min-width:70px;">';
      html += '<span style="font-size:9px;color:var(--dim);">依赖↓</span>';
      for (var j = i - 1; j >= 0; j--) {
        if (deps[layerOrder[j]]) {
          html += '<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:' + (lc[layerOrder[j]] || '#888') + ';" title="' + (ln[layerOrder[j]] || '') + '"></span>';
        }
      }
      html += '</div>';
    } else {
      html += '<div style="min-width:70px;"></div>';
    }
    html += '</div>';

    // 层间连接线
    if (i > 0) {
      html += '<div style="height:16px;display:flex;align-items:center;justify-content:center;">';
      html += '<div style="width:2px;height:12px;background:var(--rule);border-radius:1px;"></div>';
      html += '</div>';
    }
  }
  html += '</div>';

  // 图例
  var legendHtml = '<div style="display:flex;flex-wrap:wrap;justify-content:center;gap:12px;padding:8px 0;">';
  for (var i = layerOrder.length - 1; i >= 0; i--) {
    var k = layerOrder[i];
    if (!layers.filter(function(x) { return x.layer === k; })[0]) continue;
    legendHtml += '<span style="display:inline-flex;align-items:center;gap:4px;font-size:10px;color:var(--muted);">';
    legendHtml += '<span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:' + (lc[k] || '#888') + ';"></span>';
    legendHtml += k + ' ' + (ln[k] || '') + '</span>';
  }
  legendHtml += '</div>';
  var legendEl = document.getElementById('depLegend');
  if (legendEl) legendEl.innerHTML = legendHtml;
  c.innerHTML = html;
}

function renderFileDeps(c, lc, ln, ld, layers) {
  var layerOrder = ['L0','L1','L2','L3','L4','L5','L6','L7'];
  var html = '<div style="padding:8px;">';
  layerOrder.forEach(function(k) {
    var l = layers.filter(function(x) { return x.layer === k; })[0];
    if (!l) return;
    var color = lc[k] || '#888';
    var name = ln[k] || l.name;
    var files = archData.files.filter(function(f) { return f.layer === k; });
    files.sort(function(a, b) {
      var da = (a.depends_on || []).length + (a.depended_by || []).length;
      var db = (b.depends_on || []).length + (b.depended_by || []).length;
      return db - da;
    });

    html += '<div style="margin-bottom:10px;background:#1c1c1e;border-radius:8px;overflow:hidden;border:1px solid #2c2c2e;">';
    html += '<div style="padding:8px 14px;background:rgba(255,255,255,0.03);border-left:4px solid ' + color + ';display:flex;align-items:center;justify-content:space-between;">';
    html += '<div><span style="font-weight:700;color:' + color + ';">' + k + '</span> <span style="font-weight:600;color:var(--ink);">' + name + '</span></div>';
    html += '<span style="font-size:11px;color:var(--dim);">' + files.length + ' 文件 · ' + l.lines + ' 行</span>';
    html += '</div>';
    html += '<div style="padding:8px 14px;display:flex;flex-wrap:wrap;gap:6px;">';
    files.forEach(function(f) {
      var depCount = (f.depends_on || []).length;
      var depByCount = (f.depended_by || []).length;
      html += '<div style="padding:4px 10px;background:' + color + ';border-radius:4px;font-size:11px;color:#fff;opacity:0.85;cursor:pointer;transition:opacity 0.15s;"';
      html += ' onclick="selectFile(\'' + f.name + '\');switchTab(\'file-detail\');"';
      html += ' onmouseover="this.style.opacity=\'1\'" onmouseout="this.style.opacity=\'0.85\'"';
      html += ' title="' + f.name + ' | 依赖 ' + depCount + ' · 被依赖 ' + depByCount + ' | ' + f.lines + ' 行">';
      html += f.name.replace('.go', '');
      if (depCount > 0 || depByCount > 0) {
        html += ' <span style="opacity:0.55;font-size:9px;">' + (depCount > 0 ? '→' + depCount + ' ' : '') + (depByCount > 0 ? '←' + depByCount : '') + '</span>';
      }
      html += '</div>';
    });
    html += '</div></div>';
  });
  html += '</div>';
  c.innerHTML = html;
  var legendEl = document.getElementById('depLegend');
  if (legendEl) legendEl.innerHTML = '';
}

// ============================================================
// Tabs
// ============================================================
function switchTabUI(tab) {
  activeTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  const idx = { guide: 0, dashboard: 1, symbols: 2, violations: 3, dependencies: 4, version: 5, 'file-detail': 0 };
  if (tab === 'file-detail') {
    // Highlight file-detail as a special state — keep first tab highlighted
    document.querySelectorAll('.tab')[0]?.classList.add('active');
    document.getElementById('tab-file-detail')?.classList.add('active');
  } else {
    document.querySelectorAll('.tab')[idx[tab]]?.classList.add('active');
    document.getElementById('tab-' + tab)?.classList.add('active');
  }
}

function switchTab(tab) {
  // 版本对比模式在切换 Tab 时退出
  if (tab !== 'version' && diffMode) {
    diffMode = null;
  }
  selectedFile = null; // clear file selection on tab switch
  switchTabUI(tab);
  if (tab === 'guide') renderGuideTab();
  if (tab === 'dashboard') renderDashboard();
  if (tab === 'symbols') renderSymbols();
  if (tab === 'violations') renderViolations();
  if (tab === 'dependencies') renderDepGraph('all');
  if (tab === 'version') renderVersionTab();
  if (tab === 'ua') renderUATab();
  setTimeout(() => { layerChart?.resize(); kindChart?.resize(); treemapChart?.resize(); timelineChart?.resize(); }, 150);
}

// Search
function doSearch() {
  const q = document.getElementById('globalSearch').value.trim().toLowerCase();
  if (!q || !archData) return;
  for (const f of archData.files) {
    for (const s of f.symbols) {
      if (s.name.toLowerCase().includes(q)) { selectFile(f.name); showSymbolDetail(s.name, f.name); return; }
    }
  }
  for (const f of archData.files) {
    if (f.name.toLowerCase().includes(q)) { selectFile(f.name); return; }
  }
  toast('未找到: ' + q, 'info');
}

// Auto refresh
function toggleAutoRefresh() {
  autoRefresh = !autoRefresh;
  document.getElementById('autoBtn').style.opacity = autoRefresh ? '1' : '0.4';
  if (autoRefresh) {
    connectSSE();
    toast('实时推送已开启', 'ok');
  } else {
    disconnectSSE();
    if (autoTimer) { clearInterval(autoTimer); autoTimer = null; }
    updateStatus('ok', '已暂停');
    toast('实时推送已关闭', 'info');
  }
}

// Keyboard
document.addEventListener('keydown', e => {
  if ((e.metaKey || e.ctrlKey) && e.key === 'k') { e.preventDefault(); document.getElementById('globalSearch').focus(); }
  if ((e.metaKey || e.ctrlKey) && e.key === 'r') { e.preventDefault(); refreshData(); }
  if ((e.metaKey || e.ctrlKey) && e.key === '1') { e.preventDefault(); switchTab('guide'); }
  if ((e.metaKey || e.ctrlKey) && e.key === '2') { e.preventDefault(); switchTab('dashboard'); }
  if ((e.metaKey || e.ctrlKey) && e.key === '3') { e.preventDefault(); switchTab('symbols'); }
  if ((e.metaKey || e.ctrlKey) && e.key === '4') { e.preventDefault(); switchTab('violations'); }
  if ((e.metaKey || e.ctrlKey) && e.key === '5') { e.preventDefault(); switchTab('dependencies'); }
  if ((e.metaKey || e.ctrlKey) && e.key === '6') { e.preventDefault(); switchTab('version'); }
  if ((e.metaKey || e.ctrlKey) && e.key === '7') { e.preventDefault(); switchTab('ua'); }
  if (e.key === 'Escape') { closeDetail(); if (activeTab === 'file-detail') switchTab('guide'); }
});

// ============================================================
// Version Tab — 版本管理 (v0.8.0 Enhanced)
// ============================================================
let versionSubTab = 'overview';

function renderVersionTab() {
  fetch('/api/version').then(r => r.json()).then(data => {
    versionData = data;
    renderVersionContent();
  }).catch(e => {
    document.getElementById('versionContent').innerHTML = '<div class="empty">版本数据加载失败: ' + e.message + '</div>';
  });
}

function renderVersionContent() {
  const vd = versionData;
  if (!vd) return;

  let h = '';

  if (diffMode) {
    h += renderDiffView();
    document.getElementById('versionContent').innerHTML = h;
    return;
  }

  h += '<div class="version-header">';
  h += '<div class="version-current"><span class="v">v</span>' + (vd.current_version || '0.8.0') + '</div>';
  h += '<div class="version-actions">';
  h += '<button class="btn primary" onclick="createSnapshot()">创建快照</button>';
  h += '<button class="btn" onclick="enterDiffMode()">版本对比</button>';
  h += '</div>';
  h += '</div>';

  h += '<div class="version-subtabs">';
  h += '<button class="vst' + (versionSubTab === 'overview' ? ' active' : '') + '" onclick="versionSubTab=\'overview\';renderVersionContent()">概览</button>';
  h += '<button class="vst' + (versionSubTab === 'changelog' ? ' active' : '') + '" onclick="versionSubTab=\'changelog\';renderVersionContent()">Changelog</button>';
  h += '<button class="vst' + (versionSubTab === 'adr' ? ' active' : '') + '" onclick="versionSubTab=\'adr\';renderVersionContent()">ADR</button>';
  h += '<button class="vst' + (versionSubTab === 'arch-change' ? ' active' : '') + '" onclick="versionSubTab=\'arch-change\';renderVersionContent()">变更意图</button>';
  h += '<button class="vst' + (versionSubTab === 'release' ? ' active' : '') + '" onclick="versionSubTab=\'release\';renderVersionContent()">发布</button>';
  h += '</div>';

  h += '<div id="versionSubContent">';
  switch (versionSubTab) {
    case 'overview': h += renderVersionOverview(vd); break;
    case 'changelog': h += '<div id="changelogContent">加载中...</div>'; break;
    case 'adr': h += '<div id="adrContent">加载中...</div>'; break;
    case 'arch-change': h += '<div id="archChangeContent">加载中...</div>'; break;
    case 'release': h += '<div id="releaseContent">加载中...</div>'; break;
  }
  h += '</div>';

  document.getElementById('versionContent').innerHTML = h;

  if (versionSubTab === 'changelog') loadChangelog();
  else if (versionSubTab === 'adr') loadADRs();
  else if (versionSubTab === 'arch-change') loadArchChanges();
  else if (versionSubTab === 'release') loadReleaseView();
}

function renderVersionOverview(vd) {
  let h = '';
  if (vd.versions && vd.versions.length > 0) {
    h += '<div class="version-timeline">';
    vd.versions.forEach(v => {
      h += '<div class="version-entry" onclick="toggleVersionDetail(\'' + v.version + '\')" style="cursor:pointer">';
      h += '<div class="ve-header"><span class="ve-version">v' + v.version + '</span><span class="ve-date">' + (v.timestamp ? new Date(v.timestamp).toLocaleString('zh-CN') : '') + '</span></div>';
      h += '<div class="ve-stats">';
      h += '<span>文件: ' + v.files + '</span><span>行数: ' + v.lines + '</span><span>符号: ' + v.symbols + '</span>';
      h += '</div>';
      if (v.changelog_len > 0) h += '<div class="ve-changelog">变更: ' + v.changelog_len + ' 条</div>';
      h += '</div>';
    });
    h += '</div>';
    h += '<div id="versionDetailPanel"></div>';
  } else {
    h += '<div class="empty">暂无版本快照，点击"创建快照"生成第一个版本记录</div>';
  }
  return h;
}

function toggleVersionDetail(version) {
  const panel = document.getElementById('versionDetailPanel');
  if (!panel) return;
  if (panel.dataset.version === version) { panel.innerHTML = ''; panel.dataset.version = ''; return; }
  panel.dataset.version = version;
  panel.innerHTML = '<div class="version-detail-panel"><div class="vdp-header"><span class="vdp-title">加载中...</span><button class="vdp-close" onclick="document.getElementById(\'versionDetailPanel\').innerHTML=\'\';document.getElementById(\'versionDetailPanel\').dataset.version=\'\'">x</button></div></div>';
  fetch('/api/version/changelog?v=' + version)
    .then(r => r.json()).then(data => {
      let h = '<div class="version-detail-panel">';
      h += '<div class="vdp-header"><span class="vdp-title">v' + version + ' 详情</span><button class="vdp-close" onclick="document.getElementById(\'versionDetailPanel\').innerHTML=\'\';document.getElementById(\'versionDetailPanel\').dataset.version=\'\'">x</button></div>';
      h += '<div class="vdp-stats"><div class="vdp-stat"><div class="vdp-val">' + (data.changelog ? data.changelog.length : 0) + '</div><div class="vdp-label">变更条目</div></div></div>';
      if (data.changelog && data.changelog.length > 0) {
        h += '<div class="changelog-panel"><div style="font-size:12px;color:var(--dim);margin-bottom:8px">变更记录</div>';
        data.changelog.forEach(e => {
          h += '<div class="cl-entry"><span class="cl-type-tag ' + e.type + '">' + e.type + '</span><span>' + escapeHTML(e.message) + '</span></div>';
        });
        h += '</div>';
      }
      h += '</div>';
      panel.innerHTML = h;
    }).catch(e => { panel.innerHTML = '<div class="version-detail-panel"><div class="empty">加载失败: ' + e.message + '</div></div>'; });
}

function loadChangelog() {
  fetch('/api/version/changelog').then(r => r.json()).then(data => {
    let h = '<input class="version-search" placeholder="搜索 Changelog..." oninput="filterChangelog(this.value)" id="changelogSearch">';
    h += '<div class="changelog-panel" id="changelogList">';
    if (data.changelog && data.changelog.length > 0) {
      data.changelog.forEach(e => {
        h += '<div class="cl-entry cl-item" data-type="' + e.type + '" data-msg="' + (e.message || '').toLowerCase() + '">';
        h += '<span class="cl-type-tag ' + e.type + '">' + e.type + '</span>';
        if (e.scope) h += '<span style="font-size:10px;color:var(--dim);margin-right:4px">(' + e.scope + ')</span>';
        h += '<span>' + escapeHTML(e.message) + '</span></div>';
      });
    } else { h += '<div class="empty">暂无 Changelog 数据</div>'; }
    h += '</div>';
    document.getElementById('changelogContent').innerHTML = h;
  }).catch(e => { document.getElementById('changelogContent').innerHTML = '<div class="empty">加载失败: ' + e.message + '</div>'; });
}

function filterChangelog(val) {
  const q = val.toLowerCase();
  document.querySelectorAll('.cl-item').forEach(el => {
    el.style.display = (!q || (el.dataset.type || '').includes(q) || (el.dataset.msg || '').includes(q)) ? '' : 'none';
  });
}

function loadADRs() {
  fetch('/api/version/adr').then(r => r.json()).then(data => {
    let h = '';
    if (data && data.adrs && data.adrs.length > 0) {
      h += '<div style="color:var(--dim);font-size:11px;margin-bottom:8px">共 ' + data.total + ' 条记录</div>';
      data.adrs.forEach(adr => {
        const sc = (adr.status || '').toLowerCase();
        h += '<div class="adr-card" onclick="toggleADRDetail(\'' + adr.id + '\')"><div class="adr-header"><span class="adr-id">' + adr.id + '</span><span class="adr-title">' + escapeHTML(adr.title) + '</span></div>';
        h += '<div class="adr-meta"><span class="adr-status-tag ' + sc + '">' + (adr.status || 'Proposed') + '</span>';
        if (adr.version) h += '<span>v' + adr.version + '</span>';
        if (adr.date) h += '<span>' + adr.date + '</span>';
        h += '</div>';
        h += '<div id="adr-detail-' + adr.id + '" style="display:none;margin-top:12px;padding-top:12px;border-top:1px solid var(--rule);font-size:12px;color:var(--dim)">';
        if (adr.context) h += '<div style="margin-bottom:8px"><strong style="color:var(--ink)">Context:</strong> ' + escapeHTML(adr.context) + '</div>';
        if (adr.decision) h += '<div style="margin-bottom:8px"><strong style="color:var(--ink)">Decision:</strong> ' + escapeHTML(adr.decision) + '</div>';
        if (adr.consequences) h += '<div><strong style="color:var(--ink)">Consequences:</strong> ' + escapeHTML(adr.consequences) + '</div>';
        h += '</div></div>';
      });
    } else { h += '<div class="empty">暂无 ADR 记录</div>'; }
    h += '<button class="btn primary" style="margin-top:12px" onclick="showCreateADRForm()">+ 创建 ADR</button><div id="createADRForm" style="display:none;margin-top:12px"></div>';
    document.getElementById('adrContent').innerHTML = h;
  }).catch(e => { document.getElementById('adrContent').innerHTML = '<div class="empty">加载失败: ' + e.message + '</div>'; });
}

function toggleADRDetail(id) { const el = document.getElementById('adr-detail-' + id); if (el) el.style.display = el.style.display === 'none' ? 'block' : 'none'; }

function showCreateADRForm() {
  const el = document.getElementById('createADRForm'); if (!el) return;
  let h = '<div class="version-detail-panel"><div class="vdp-header"><span class="vdp-title">创建 ADR</span><button class="vdp-close" onclick="document.getElementById(\'createADRForm\').style.display=\'none\'">x</button></div>';
  h += '<input id="adrTitle" placeholder="标题" style="width:100%;padding:8px;margin-bottom:8px;background:var(--card);border:1px solid var(--rule);border-radius:6px;color:var(--ink);font-size:12px">';
  h += '<input id="adrVersion" placeholder="关联版本 (如 0.8.0)" style="width:100%;padding:8px;margin-bottom:8px;background:var(--card);border:1px solid var(--rule);border-radius:6px;color:var(--ink);font-size:12px">';
  h += '<textarea id="adrContext" placeholder="Context" rows="3" style="width:100%;padding:8px;margin-bottom:8px;background:var(--card);border:1px solid var(--rule);border-radius:6px;color:var(--ink);font-size:12px;resize:vertical"></textarea>';
  h += '<textarea id="adrDecision" placeholder="Decision" rows="3" style="width:100%;padding:8px;margin-bottom:8px;background:var(--card);border:1px solid var(--rule);border-radius:6px;color:var(--ink);font-size:12px;resize:vertical"></textarea>';
  h += '<textarea id="adrConsequences" placeholder="Consequences" rows="3" style="width:100%;padding:8px;margin-bottom:8px;background:var(--card);border:1px solid var(--rule);border-radius:6px;color:var(--ink);font-size:12px;resize:vertical"></textarea>';
  h += '<button class="btn primary" onclick="createADR()">提交</button></div>';
  el.innerHTML = h; el.style.display = 'block';
}

function createADR() {
  const body = { title: document.getElementById('adrTitle')?.value || '', version: document.getElementById('adrVersion')?.value || '', context: document.getElementById('adrContext')?.value || '', decision: document.getElementById('adrDecision')?.value || '', consequences: document.getElementById('adrConsequences')?.value || '', status: 'Accepted' };
  fetch('/api/version/adr', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) })
    .then(r => r.json()).then(data => {

function executeRelease(dryRun) {
  const resultEl = document.getElementById('releaseResult'); if (!resultEl) return;
  resultEl.innerHTML = '<div style="color:var(--dim);font-size:12px">执行中...</div>';
  fetch('/api/version/release', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ dry_run: dryRun }) })
    .then(r => r.json()).then(data => {
      if (data.error) { resultEl.innerHTML = '<div style="color:var(--red);font-size:12px">错误: ' + data.error + '</div>'; return; }
      let h = '<div class="version-detail-panel"><div class="vdp-header"><span class="vdp-title">' + (dryRun ? 'Dry Run 结果' : '发布结果') + '</span></div>';
      if (data.plan && data.plan.version) h += '<div style="font-size:12px;color:var(--dim);margin-bottom:8px">版本: ' + (data.plan.version.String || data.plan.version) + '</div>';
      if (data.result && data.result.steps) {
        h += '<div class="release-pipeline">';
        data.result.steps.forEach((s, i) => {
          h += '<div class="release-step"><div class="rs-icon ' + (s.status || 'pending') + '">' + (i + 1) + '</div><div class="rs-name">' + (s.name || '') + '</div></div>';
          if (i < (data.result.steps.length - 1)) h += '<div class="rs-arrow"></div>';
        });
        h += '</div>';
        if (data.result.success) h += '<div style="color:var(--green);font-size:12px;margin-top:8px">发布成功!</div>';
      }
      h += '</div>'; resultEl.innerHTML = h;
    }).catch(e => { resultEl.innerHTML = '<div style="color:var(--red);font-size:12px">请求失败: ' + e.message + '</div>'; });
}

function enterDiffMode() {

  diffMode = { v1: versions[1].version, v2: versions[0].version };

}

function renderDiffView() {
  if (!diffMode) return '';
  const versions = versionData?.versions || [];
  let h = '<div class="version-header"><div class="version-current" style="font-size:20px">版本对比</div><div class="version-actions">';
  h += '<select id="diffV1" onchange="diffMode.v1=this.value;renderDiffViewData()" style="background:#1c1c1e;color:#f5f5f7;border:1px solid #2c2c2e;border-radius:6px;padding:6px 10px;font-size:12px">';
  versions.forEach(v => { h += '<option value="' + v.version + '"' + (v.version === diffMode.v1 ? ' selected' : '') + '>v' + v.version + '</option>'; });
  h += '</select><span style="color:var(--dim)">→</span>';
  h += '<select id="diffV2" onchange="diffMode.v2=this.value;renderDiffViewData()" style="background:#1c1c1e;color:#f5f5f7;border:1px solid #2c2c2e;border-radius:6px;padding:6px 10px;font-size:12px">';
  versions.forEach(v => { h += '<option value="' + v.version + '"' + (v.version === diffMode.v2 ? ' selected' : '') + '>v' + v.version + '</option>'; });
  h += '</select><button class="btn" onclick="diffMode=null;renderVersionContent()">退出对比</button>';
  h += '</div></div><div id="diffDetail">加载中...</div>';

}

function renderDiffViewData() {
  if (!diffMode || !diffMode.v1 || !diffMode.v2) return;
  fetch('/api/version/diff?v1=' + diffMode.v1 + '&v2=' + diffMode.v2)
    .then(r => r.json()).then(diff => { renderDiffDetail(diff); })
    .catch(e => { document.getElementById('diffDetail').innerHTML = '<div class="empty">对比失败: ' + e.message + '</div>'; });
}

function renderDiffDetail(diff) {
  if (diff.error) { document.getElementById('diffDetail').innerHTML = '<div class="empty">对比失败: ' + diff.error + '</div>'; return; }
  let h = '<div class="diff-container">';
  const linesAdded = diff.total_diff?.lines_added || 0;
  const linesRemoved = Math.abs(linesAdded < 0 ? linesAdded : 0);
  const symbolsAdded = diff.total_diff?.symbols_added || 0;
  h += '<div class="diff-column"><div class="dc-title">v' + diff.version_from + ' → v' + diff.version_to + '</div><div class="diff-stats">';
  if (diff.files_added?.length) h += '<span class="added">+ ' + diff.files_added.length + ' 新增</span>';
  if (diff.files_removed?.length) h += '<span class="removed">- ' + diff.files_removed.length + ' 删除</span>';
  if (diff.files_changed?.length) h += '<span style="color:var(--orange)">~ ' + diff.files_changed.length + ' 修改</span>';
  h += '</div><div class="diff-stats">';
  h += '<span class="added">+ ' + (linesAdded > 0 ? linesAdded : 0) + ' 行</span>';
  h += '<span class="removed">- ' + linesRemoved + ' 行</span>';
  h += '<span class="added">+ ' + (symbolsAdded > 0 ? symbolsAdded : 0) + ' 符号</span>';
  h += '</div></div>';
  h += '<div class="diff-column"><div class="dc-title">变更详情</div><ul class="diff-file-list">';
  (diff.files_added || []).forEach(f => { h += '<li><span class="diff-tag added">新增</span>' + f + '</li>'; });
  (diff.files_removed || []).forEach(f => { h += '<li><span class="diff-tag removed">删除</span>' + f + '</li>'; });
  (diff.files_changed || []).forEach(f => {
    const delta = f.lines_after - f.lines_before;
    h += '<li><span class="diff-tag changed">修改</span>' + f.name + '<span class="diff-delta">' + (delta >= 0 ? '+' + delta : '' + delta) + '行</span></li>';
  });
  h += '</ul></div></div>';
  document.getElementById('diffDetail').innerHTML = h;
}

  }
  if (d.edge_types) {
    h += '<div class="stat-card"><div class="stat-value">' + Object.keys(d.edge_types).length + '</div><div class="stat-label">边类型</div></div>';
  }
  st.innerHTML = h;
}

function renderUANodeChart() {
  const container = document.getElementById('ua-chart');
  if (uaChart) { uaChart.dispose(); uaChart = null; }
  if (!uaGraphData || !uaGraphData.graph) return;

  const graph = uaGraphData.graph;
  const nodes = (graph.nodes || []).slice(0, 200);

  uaChart = echarts.init(container);
  const layerColors = {
    'L0': '#30d158', 'L1': '#0a84ff', 'L2': '#ff9f0a',
    'L3': '#af52de', 'L4': '#ff375f', 'L5': '#5e5ce6',
    'L6': '#ff6482', 'L7': '#ac8e68'
  };

  const layerNodeMap = {};
  if (graph.layers) {
    graph.layers.forEach(l => {
      l.nodeIds && l.nodeIds.forEach(id => { layerNodeMap[id] = l.id; });
    });
  }

  const categories = [
    { name: 'L0: 基础' }, { name: 'L1: 原语' }, { name: 'L2: 组合' },
    { name: 'L3: 适配' }, { name: 'L4: 监督' }, { name: 'L5: 观测' },
    { name: 'L6: 应用' }, { name: 'L7: 入口' }
  ];

  const scatterData = nodes.map((n, i) => {
    const layer = layerNodeMap[n.id] || 'L3';
    const lIdx = parseInt(layer.replace('L','')) || 3;
    const x = (lIdx * 80) + Math.random() * 40;
    const y = Math.random() * 300;
    const size = n.complexity === 'complex' ? 14 : n.complexity === 'moderate' ? 10 : 7;
    return { name: n.name, value: [x, y, size], itemStyle: { color: layerColors[layer] || '#8e8e93' }, nodeData: n, layer: layer };
  });

  const option = {
    tooltip: {
      trigger: 'item',
      formatter: function(p) {
        const n = p.data.nodeData;
        if (!n) return p.name;
        return '<b>' + n.name + '</b><br/>类型: ' + n.type + '<br/>复杂度: ' + (n.complexity||'unknown') + '<br/>' + (n.summary||'');
      }
    },
    grid: { left: 10, right: 10, top: 10, bottom: 10 },
    xAxis: { type: 'value', show: false, min: -20, max: 660 },
    yAxis: { type: 'value', show: false, min: -20, max: 320 },
    series: [{
      type: 'scatter',
      data: scatterData,
      symbolSize: function(d) { return d[2]; },
      itemStyle: { borderColor: '#1c1c1e', borderWidth: 1, opacity: 0.85 },
      emphasis: { scale: 1.5 }
    }]
  };

  uaChart.setOption(option);
  uaChart.on('click', function(params) {
    if (params.data && params.data.nodeData) {
      showUANodeDetail(params.data.nodeData);
    }
  });
  setTimeout(() => uaChart && uaChart.resize(), 100);
}

function renderUATypeChart() {
  const container = document.getElementById('ua-type-chart');
  if (uaTypeChart) { uaTypeChart.dispose(); uaTypeChart = null; }
  if (!uaGraphData || !uaGraphData.node_types) return;

  uaTypeChart = echarts.init(container);
  const types = uaGraphData.node_types;
  const typeData = Object.keys(types).map(k => ({ name: k, value: types[k] }));
  typeData.sort((a, b) => b.value - a.value);

  const colors = ['#30d158','#0a84ff','#ff9f0a','#af52de','#ff375f','#5e5ce6','#ff6482','#ac8e68','#64d2ff','#ffd60a'];

  const option = {
    title: { text: '节点类型分布', left: 'center', top: 8, textStyle: { color: '#8e8e93', fontSize: 12 } },
    tooltip: { trigger: 'item', formatter: '{b}: {c} ({d}%)' },
    series: [{
      type: 'pie',
      radius: ['40%', '70%'],
      center: ['50%', '55%'],
      data: typeData.slice(0, 8),
      label: { color: '#8e8e93', fontSize: 10 },
      itemStyle: { borderColor: '#1c1c1e', borderWidth: 2 }
    }],
    color: colors
  };

  uaTypeChart.setOption(option);
}

function showUANodeDetail(node) {
  const el = document.getElementById('ua-detail');
  let tags = (node.tags || []).map(t => '<span style="display:inline-block;background:var(--bg);padding:1px 6px;border-radius:3px;font-size:11px;margin:2px;border:1px solid var(--border);">' + escHtml(t) + '</span>').join('');
  let h = '<div style="margin-bottom:12px;">';
  h += '<div style="font-size:16px;font-weight:600;color:var(--text);margin-bottom:4px;">' + escHtml(node.name) + '</div>';
  h += '<div style="font-size:12px;color:var(--text-muted);margin-bottom:8px;">' + escHtml(node.type) + ' · ' + (node.complexity||'unknown') + ' · ID: ' + escHtml(node.id) + '</div>';
  if (node.filePath) h += '<div style="font-size:12px;color:var(--text-muted);margin-bottom:4px;">📁 ' + escHtml(node.filePath) + '</div>';
  h += '<div style="font-size:12px;color:var(--text-muted);margin-bottom:8px;">' + tags + '</div>';
  h += '</div>';
  if (node.summary) {
    h += '<div style="font-size:13px;color:var(--text);line-height:1.5;padding:8px;background:var(--bg);border-radius:6px;">' + escHtml(node.summary) + '</div>';
  }
  el.innerHTML = h;
}

async function refreshUAGraph() {
  document.getElementById('ua-status').style.display = 'block';
  document.getElementById('ua-status').innerHTML = '<div style="color:#0a84ff;font-size:13px;">刷新中...</div>';
  uaGraphData = null;
  await renderUATab();
  document.getElementById('ua-status').style.display = 'none';
  toast('知识图谱已刷新', 'ok');
}

async function validateUAGraph() {
  const statusEl = document.getElementById('ua-status');
  statusEl.style.display = 'block';
  statusEl.innerHTML = '<div style="color:#0a84ff;font-size:13px;">验证中...</div>';

  try {
    const res = await fetch('/api/ua/validate');
    const data = await res.json();
    if (data.error) {
      statusEl.innerHTML = '<div style="color:#ff375f;font-size:13px;">验证失败: ' + data.error + '</div>';
      return;
    }

    let color = data.fail_count > 0 ? '#ff375f' : data.warn_count > 0 ? '#ff9f0a' : '#30d158';
    statusEl.innerHTML = '<div style="display:flex;align-items:center;gap:8px;font-size:13px;">' +
      '<span style="color:' + color + ';font-weight:600;">' + data.summary + '</span>' +
      '<span style="display:flex;gap:6px;margin-left:8px;">' +
      '<span style="color:#30d158;">✓ ' + data.pass_count + '</span>' +
      '<span style="color:#ff9f0a;">⚠ ' + data.warn_count + '</span>' +
      '<span style="color:#ff375f;">✗ ' + data.fail_count + '</span>' +
      '</span></div>';

    const detail = document.getElementById('ua-detail');
    let h = '<div style="font-size:14px;font-weight:600;margin-bottom:12px;color:var(--text);">约束验证结果</div>';
    (data.results || []).forEach(r => {
      const icon = r.status === 'pass' ? '✓' : r.status === 'warn' ? '⚠' : '✗';
      const color = r.status === 'pass' ? '#30d158' : r.status === 'warn' ? '#ff9f0a' : '#ff375f';
      h += '<div style="margin-bottom:8px;padding:8px;background:var(--bg);border-radius:6px;border-left:3px solid ' + color + ';">';
      h += '<div style="font-size:12px;font-weight:600;color:var(--text);">' + icon + ' ' + escHtml(r.name) + '</div>';
      h += '<div style="font-size:11px;color:var(--text-muted);margin-top:2px;">' + escHtml(r.detail) + '</div>';
      if (r.violations && r.violations.length > 0) {
        h += '<div style="font-size:11px;color:#ff375f;margin-top:4px;">' + r.violations.map(v => '· ' + escHtml(v)).join('<br/>') + '</div>';
      }
      h += '</div>';
    });
    detail.innerHTML = h;
  } catch (e) {
    statusEl.innerHTML = '<div style="color:#ff375f;font-size:13px;">验证失败: ' + e.message + '</div>';
  }
}

async function searchUAGraph() {
  const q = document.getElementById('uaSearchInput').value.trim();
  if (!q) return;
  const detail = document.getElementById('ua-detail');
  detail.innerHTML = '<div style="color:var(--text-muted);font-size:13px;text-align:center;padding-top:40px;">搜索中...</div>';

  try {
    const res = await fetch('/api/ua/search?q=' + encodeURIComponent(q) + '&limit=20');
    const data = await res.json();
    if (data.error) {
      detail.innerHTML = '<div style="color:#ff375f;font-size:13px;text-align:center;padding-top:40px;">' + data.error + '</div>';
      return;
    }

    let h = '<div style="font-size:14px;font-weight:600;margin-bottom:12px;color:var(--text);">搜索结果: ' + data.total + ' 条</div>';
    (data.results || []).forEach(r => {
      const node = r.node;
      h += '<div style="margin-bottom:8px;padding:8px;background:var(--bg);border-radius:6px;cursor:pointer;" onclick="showUANodeDetail(uaGraphData.graph.nodes.find(n=>n.id===\'' + (node.id||'').replace(/'/g,"\\'") + '\'))">';
      h += '<div style="display:flex;justify-content:space-between;align-items:center;">';
      h += '<span style="font-size:13px;font-weight:600;color:var(--text);">' + escHtml(node.name) + '</span>';
      h += '<span style="font-size:11px;color:#0a84ff;">' + r.score.toFixed(1) + '</span>';
      h += '</div>';
      h += '<div style="font-size:11px;color:var(--text-muted);margin-top:2px;">' + escHtml(node.type) + ' · 匹配: ' + r.match_in + '</div>';
      h += '</div>';
    });
    if (data.total === 0) {
      h += '<div style="color:var(--text-muted);font-size:13px;text-align:center;padding-top:20px;">未找到匹配节点</div>';
    }
    detail.innerHTML = h;
  } catch (e) {
    detail.innerHTML = '<div style="color:#ff375f;font-size:13px;text-align:center;padding-top:40px;">搜索失败: ' + e.message + '</div>';
  }
}

function escapeHTML(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// Helpers
function escHtml(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// Init
if (typeof mermaid !== 'undefined') {
  mermaid.initialize({ startOnLoad: false, theme: 'dark', securityLevel: 'loose', themeVariables: { primaryColor: '#1c1c1e', primaryTextColor: '#f5f5f7', primaryBorderColor: '#2c2c2e', lineColor: '#48484a', secondaryColor: '#161618', tertiaryColor: '#0a0a0a' } });
}

async function init() {
  updateStatus('loading', '连接中...');
  try {
    await fetchAll();
    recordHealthHistory();
    renderAll();
    connectSSE();
    toast('架构管理器已就绪 (SSE 实时)', 'ok');
  } catch (e) {
    updateStatus('error', '连接失败');
    toast('连接失败: ' + e.message, 'err');
    setTimeout(init, 3000);
  }
}
document.addEventListener('DOMContentLoaded', init);
