<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Low-Entropy Core · 架构管理器</title>
    <link rel="stylesheet" href="arch-manager.css">
</head>
<body>
    <header class="top-header">
        <div class="logo-area">
            <span class="logo">🜲</span>
            <div class="logo-text">
                <h1>Low-Entropy Core</h1>
                <span class="subtitle">架构管理器 · Architecture Governance</span>
            </div>
        </div>
        <div class="header-right">
            <div id="summary-stats" class="summary-stats">
                <div class="stat-card"><div class="stat-label">加载中</div><div class="stat-value">...</div></div>
            </div>
        </div>
    </header>

    <nav class="side-nav">
        <button class="nav-tab active" data-target="overview">🏛 架构全景</button>
        <button class="nav-tab" data-target="primitives">⚛ 四原语</button>
        <button class="nav-tab" data-target="health">📊 健康评分</button>
        <button class="nav-tab" data-target="violations">⚠ 违规检测</button>
        <button class="nav-tab" data-target="origin">🔍 符号溯源</button>
        <button class="nav-tab" data-target="flow">🌊 数据流拓扑</button>
        <button class="nav-tab" data-target="pipeline">🔬 观测管道</button>
        <button class="nav-tab" data-target="guardian">🛡 Guardian</button>
        <button class="nav-tab" data-target="migration">🚀 迁移引擎</button>
        <button class="nav-tab" data-target="entropy">📈 熵与观测</button>
    </nav>

    <main class="content">
        <div id="loading" class="loading-overlay">
            <div class="loading-content">
                <div class="spinner"></div>
                <p>正在加载架构数据...</p>
            </div>
        </div>

        <section id="overview" class="panel active"></section>
        <section id="primitives" class="panel"></section>
        <section id="health" class="panel"></section>
        <section id="violations" class="panel"></section>
        <section id="origin" class="panel"></section>
        <section id="flow" class="panel"></section>
        <section id="pipeline" class="panel"></section>
        <section id="guardian" class="panel"></section>
        <section id="migration" class="panel"></section>
        <section id="entropy" class="panel"></section>
    </main>

    <script src="arch-manager-dashboard.js"></script>
</body>
</html>
