name: CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.22', '1.23']

    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ matrix.go-version }}

    - name: Lint
      run: |
        cd go-core
        go vet ./...

    - name: Architecture Lint
      run: |
        cd go-core
        go run ./cmd/lint/ --root . --tier L2

    - name: Security Scan
      run: |
        cd go-core
        go vet -vettool=$(which govulncheck 2>/dev/null || echo "") ./... 2>/dev/null || echo "govulncheck not installed, skipping"

    - name: Test with coverage
      run: |
        cd go-core
        go test -race ./... -coverprofile=coverage.out -covermode=atomic -count=1

    - name: Coverage report
      run: |
        cd go-core
        go tool cover -func=coverage.out | tail -1
        COVERAGE=$(go tool cover -func=coverage.out | tail -1 | awk '{print $3}' | sed 's/%//')
        echo "Total coverage: ${COVERAGE}%"
        if [ "$(echo "$COVERAGE < 70" | bc)" -eq 1 ]; then
          echo "::warning::Coverage ${COVERAGE}% is below 70% threshold"
        fi

    - name: Benchmark regression
      run: |
        cd go-core
        go test -bench=. -benchmem -count=1 ./...

    - name: Build examples
      run: |
        cd examples/calculator && go build .
        cd ../../examples/task_scheduler && go build .

    - name: Build arch-manager
      run: |
        cd cmd/arch-manager && go build .